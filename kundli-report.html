<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shubh Din — Kundli Report</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Devanagari:wght@400;500;600;700&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Telugu:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#5C1A1B;--gold:#B8860B;--gold2:#D4A843;--paper:#FFFDF6;--soft:#8B5A2B;--saffron:#E8730C;}
*{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#EFE9DC;font-family:'Noto Serif Devanagari','Cormorant Garamond','Noto Serif Devanagari',serif;color:var(--ink);}
.screen{max-width:760px;margin:24px auto;background:var(--paper);border:1px solid var(--gold2);border-radius:12px;padding:28px;}
h1.brand{font-size:26px;text-align:center;color:var(--ink);}
.sub{text-align:center;color:var(--soft);font-size:13px;margin:4px 0 18px;}
label{display:block;font-size:13px;color:var(--soft);margin:10px 0 4px;}
input,select,button{font-family:inherit;font-size:15px;padding:9px 10px;border:1px solid var(--gold2);border-radius:8px;background:#fff;color:var(--ink);width:100%;}
button{background:linear-gradient(135deg,#8B2B33,#5C1A1B);color:#FFE8C8;border:none;cursor:pointer;margin-top:16px;font-size:16px;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.confirm{background:#FFF6E3;border:1px dashed var(--gold);border-radius:10px;padding:14px;margin-top:16px;display:none;}
.confirm b{color:#8B2B33;}
.langToggle{display:flex;gap:8px;margin-top:10px;}
.langToggle button{margin:0;background:#fff;color:var(--ink);border:1px solid var(--gold2);}
.langToggle button.on{background:var(--ink);color:#FFE8C8;}
/* ---------- REPORT ---------- */
#report{display:none;}
.page{max-width:794px;margin:16px auto;background:var(--paper);padding:48px 52px;box-shadow:0 2px 14px rgba(92,26,27,0.12);position:relative;min-height:1000px;}
.page::before{content:"";position:absolute;inset:14px;border:1.5px solid var(--gold2);border-radius:4px;pointer-events:none;}
.cover{display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;}
.om{font-size:54px;color:var(--gold);}
.cover h1{font-size:38px;margin:12px 0 4px;}
.cover .name{font-size:30px;color:#8B2B33;margin:26px 0 6px;font-weight:700;}
.cover .bd{font-size:16px;color:var(--soft);}
.tagfree{margin-top:34px;font-size:14px;color:var(--gold);border-top:1px solid var(--gold2);border-bottom:1px solid var(--gold2);padding:8px 18px;}
h2.sec{font-size:22px;color:var(--saffron);border-bottom:2px solid var(--gold2);padding-bottom:6px;margin:6px 0 16px;}
.dyk{background:#FFF9EE;border:1px solid var(--gold2);border-left:5px solid var(--saffron);border-radius:8px;padding:10px 14px;margin:12px 0;font-size:13.5px;line-height:1.7;}
.dyk b{color:var(--saffron);}
table{width:100%;border-collapse:collapse;font-size:14px;margin:8px 0 18px;}
th,td{border:1px solid #E4D3AE;padding:6px 9px;text-align:left;}
th{background:#F8EFD8;color:#5C1A1B;font-weight:600;}
tr:nth-child(even) td{background:#FDF8EC;}
.prose{font-size:15.5px;line-height:1.85;text-align:justify;margin-bottom:14px;}
.cardrow{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px;}
.idcard{background:#FFF6E3;border:1px solid var(--gold2);border-radius:10px;padding:12px 14px;}
.idcard .t{font-size:12px;color:var(--soft);}
.idcard .v{font-size:18px;color:#8B2B33;font-weight:700;margin-top:2px;}
.chartwrap{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin:10px 0 18px;}
.chartbox{text-align:center;}
.chartbox .cap{font-size:13px;color:var(--soft);margin-top:6px;}
.yog{background:#FDF8EC;border-left:4px solid var(--gold);padding:10px 14px;margin-bottom:10px;font-size:15px;line-height:1.7;}
.dos{background:#FFF3F0;border-left:4px solid #B8434A;padding:10px 14px;margin-bottom:10px;font-size:15px;line-height:1.7;}
.dos.ok{background:#F2F8EF;border-left-color:#5A8B2B;}
.rem{display:grid;grid-template-columns:110px 1fr;gap:10px;border:1px solid #E4D3AE;border-radius:8px;padding:10px 12px;margin-bottom:9px;font-size:14px;align-items:center;}
.rem .m{color:#8B2B33;font-weight:700;}
.foot{font-size:12.5px;color:var(--soft);border-top:1px solid var(--gold2);padding-top:10px;margin-top:22px;line-height:1.7;}
.savhot{background:#EAF3E2 !important;font-weight:700;}
.savcold{background:#F9E9E7 !important;}
.antar{font-size:12px;color:var(--soft);}
.printbar{max-width:794px;margin:10px auto;text-align:center;}
.printbar button{width:auto;padding:10px 28px;}
@media print{
  body{background:#fff;}
  .screen,.printbar{display:none !important;}
  #report{display:block !important;}
  .page{box-shadow:none;margin:0;page-break-after:always;min-height:auto;padding:34px 40px;}
  .page:last-child{page-break-after:auto;}
}
@page{size:A4;margin:10mm;}

/* devanagari-print-safety: letter-spacing splits matras/conjuncts (दि ल). Never apply to Indic text. */
body,.page,.prose,.idcard,.yog,td,th,h1,h2,div,span{letter-spacing:normal;}
.stars,.scorepill{letter-spacing:2px;}
@media print{*{-webkit-font-feature-settings:"liga" 1,"kern" 1;font-feature-settings:"liga" 1,"kern" 1;}}

/* ── DEVANAGARI SHAPING SAFETY ──────────────────────────────────────────────
   A Latin-first font stack (e.g. 'Cormorant Garamond' first) forces the browser
   into PER-CHARACTER font fallback for Hindi. Shaping a syllable cluster across
   two font runs splits matras/conjuncts:  करियर → "करि यर",  बातचीत → "बा तची त".
   Fix: when the report renders in Hindi, use ONE complete Devanagari font for
   everything, and disable anything that can insert space inside a cluster. */
#report.lang-hi, #report.lang-hi *{
  font-family:'Noto Serif Devanagari','Nirmala UI','Mangal','Kokila',serif !important;
  letter-spacing:normal !important;
  word-spacing:normal !important;
  word-break:normal !important;
  overflow-wrap:normal !important;
  font-synthesis:none;               /* faux-bold can break conjunct shaping */
  text-rendering:optimizeLegibility;
}
#report.lang-hi .prose{text-align:left;}   /* justify stretches Indic awkwardly */
@media print{
  #report.lang-hi, #report.lang-hi *{
    font-family:'Noto Serif Devanagari','Nirmala UI','Mangal',serif !important;
    letter-spacing:normal !important;
  }
}

/* Telugu: same single-font shaping law as Devanagari (§10.2 / §T6) */
#report.lang-te, #report.lang-te *{
  font-family:'Noto Serif Telugu','Gautami','Nirmala UI',serif !important;
  letter-spacing:normal !important; word-spacing:normal !important;
  word-break:normal !important; overflow-wrap:normal !important;
  font-synthesis:none; text-rendering:optimizeLegibility;
}
#report.lang-te .prose{text-align:left;}
@media print{#report.lang-te, #report.lang-te *{
  font-family:'Noto Serif Telugu','Gautami','Nirmala UI',serif !important;letter-spacing:normal !important;}}
</style>
</head>
<body>

<div class="screen" id="inputScreen">
  <h1 class="brand">🕉️ शुभ दिन — Kundli Report</h1>
  <div class="sub">Free · Drik-Ganita Accurate · No gemstone selling, ever</div>
  <div class="row">
    <div><label>Name / नाम</label><input id="pname" type="text" value="" placeholder="Full name"></div>
    <div><label>Gender / लिंग</label><select id="pgender"><option>Male</option><option>Female</option></select></div>
  </div>
  <div class="row">
    <div><label>Birth Date / जन्म तिथि</label><input id="bdate" type="date" value="1996-12-06"></div>
    <div><label>Birth Time (24h) / जन्म समय</label><input id="btime" type="time" value="15:47" step="60"></div>
  </div>
  <div class="row">
    <div><label>Latitude</label><input id="blat" type="number" step="0.0001" value="16.4343"></div>
    <div><label>Longitude</label><input id="blng" type="number" step="0.0001" value="81.6985"></div>
  </div>
  <label>Birth Place (label only) / जन्म स्थान</label><input id="bplace" type="text" value="Narasapur, AP">
  <div class="langToggle"><button id="lEn" class="on" onclick="setLang('en')">English</button><button id="lHi" onclick="setLang('hi')">हिन्दी</button><button id="lTe" onclick="setLang('te')">తెలుగు</button></div>
  <button onclick="confirmStep()">Check Birth Details → जाँचें</button>
  <div class="confirm" id="confirmBox">
    <div id="confirmText" style="font-size:15px;line-height:1.9;"></div>
    <div class="row">
      <button style="background:#5A8B2B;" onclick="generate()">✓ Correct — Generate Report</button>
      <button style="background:#B8434A;" onclick="document.getElementById('confirmBox').style.display='none'">✗ Fix details</button>
    </div>
  </div>
</div>

<div class="printbar" id="printbar" style="display:none;"><button onclick="sdPrint()">🖨️ Print / Save as PDF</button></div>
<div id="report"></div>

 గులాబీ పూలు సమర్పించడం, అందాన్ని ఆదరించడం దీన్ని బలపరుస్తుంది."},venusNeutral:{en:"Your Venus holds a balanced placement, giving love a steady foundation.",hi:"आपका शुक्र संतुलित स्थिति में है, जो प्यार को मज़बूत नींव देता है।",te:"మీ జాతకంలో శుక్రుడు సమతుల్య స్థితిలో ఉన్నాడు, ఇది ప్రేమకు స్థిరమైన పునాది ఇస్తుంది."},venusRemedyIntro:{en:"Venus is the planet of love, beauty and sweetness. Honouring it brings tenderness to your relationships:",hi:"शुक्र प्यार, सुंदरता और मिठास का ग्रह है। इसे प्रसन्न रखना रिश्तों में मिठास लाता है:",te:"శుక్రుడు ప్రేమ, అందం, మాధుర్యానికి అధిపతి. ఆయనను ఆరాధించడం బంధాల్లో మాధుర్యాన్ని తెస్తుంది:"},closingQuote:{en:"\"The stars incline; they do not compel. Your open heart writes the truest love story of all.\"",hi:"\"सितारे राह दिखाते हैं, मजबूर नहीं करते। सबसे सच्ची प्रेम कहानी आपका खुला दिल ही लिखता है।\"",te:"\"గ్రహాలు దారి చూపిస్తాయి, బలవంతం చేయవు. అత్యంత నిజమైన ప్రేమ కథను రాసేది మీ తెరిచిన మనసే.\""}};

U.remedy={sun:{te:"ఆదివారం సూర్యుడికి నమస్కరించండి, ఉదయపు ఎండలో కొద్దిసేపు నిలబడండి. ఆత్మవిశ్వాసం, గౌరవం పెరుగుతాయి."},moon:{te:"సోమవారం శివుడిని ఆరాధించండి, తెల్లని వస్తువులు దానం చేయండి. మనసుకు ప్రశాంతత కలుగుతుంది."},mars:{te:"మంగళవారం హనుమంతుడిని ఆరాధించండి, ఓపికను అలవరచుకోండి. ధైర్యం సరైన దిశలో పని చేస్తుంది."},mercury:{te:"బుధవారం విష్ణువును స్మరించండి, పచ్చని వస్తువులు దానం చేయండి. మాటలో, వ్యవహారంలో స్పష్టత వస్తుంది."},jupiter:{te:"గురువారం గురువును ఆరాధించండి, పసుపు పచ్చని వస్తువులు దానం చేయండి, పెద్దలను గౌరవించండి. జ్ఞానం, అదృష్టం పెరుగుతాయి."},venus:{te:"శుక్రవారం లక్ష్మీదేవిని ఆరాధించండి, తెలుపు లేదా గులాబీ పూలు సమర్పించండి, అందాన్ని ఆదరించండి, ఉదారంగా ఇవ్వండి. ప్రేమలో, బంధాల్లో మాధుర్యం పెరుగుతుంది."},saturn:{te:"శనివారం శనిదేవుడిని ఆరాధించండి, నల్ల నువ్వులు దానం చేయండి, పేదలకు సాయం చేయండి. ఓపిక ఫలిస్తుంది."},rahu:{te:"దుర్గాదేవిని ఆరాధించండి, శనివారం దానం చేయండి, నిజాయితీగా ఉండండి. అనవసర గందరగోళం తగ్గుతుంది."},ketu:{te:"గణపతిని ఆరాధించండి, ధ్యానం అలవరచుకోండి, సాధువులకు సేవ చేయండి. మనసు స్థిరపడుతుంది."}};
U.marriage={outlookText:{en:"This is a favourable match according to classical compatibility principles. The emotional foundation is strong, and the identified challenges are manageable through communication, mutual respect, and the suggested remedies.",hi:"शास्त्रीय अनुकूलता सिद्धांतों के अनुसार यह एक शुभ संबंध है। भावनात्मक नींव सुदृढ़ है, और उल्लिखित चुनौतियाँ संवाद, परस्पर सम्मान तथा सुझाए गए उपायों से सहज प्रबंधनीय हैं।",te:"శాస్త్రీయ అనుకూలత సూత్రాల ప్రకారం ఇది ఒక శుభమైన బంధం. మనసుల పునాది బలంగా ఉంది, గుర్తించిన ఇబ్బందులు మాటలతో, పరస్పర గౌరవంతో, సూచించిన పరిహారాలతో సులభంగా సర్దుకుంటాయి."},confirmBoth:{en:"If both match known details, generate. (Do double-check AM/PM!)",hi:"दोनों विवरण सही हों तो रिपोर्ट बनाएँ। (AM/PM ज़रूर जाँचें!)",te:"రెండు వివరాలు సరిగ్గా ఉంటే రిపోర్ట్ తయారు చేయండి. (AM/PM తప్పకుండా చూడండి!)"},effectiveGuna:{en:"EFFECTIVE GUNA SCORE",hi:"असली गुण अंक",te:"అసలు గుణ స్కోర్"},noMajor:{en:"No major challenges ✓",hi:"कोई बड़ी चुनौती नहीं ✓",te:"పెద్ద ఇబ్బందులు లేవు ✓"},execSummary:{en:"Executive Summary",hi:"सारांश",te:"సారాంశం"},overallMatch:{en:"OVERALL MATCH",hi:"कुल मिलान",te:"మొత్తం మ్యాచ్"},bestQualities:{en:"BEST QUALITIES",hi:"सबसे अच्छी बातें",te:"అత్యుత్తమ లక్షణాలు"},challenges:{en:"CHALLENGES",hi:"ध्यान देने योग्य बातें",te:"గమనించాల్సినవి"},outlook:{en:"MARRIAGE OUTLOOK & RECOMMENDATION",hi:"विवाह का निष्कर्ष एवं सलाह",te:"వివాహ ఫలితం మరియు సలహా"},koota:{en:"Koota",hi:"कूट",te:"కూటం"},meaning:{en:"Meaning",hi:"अर्थ",te:"అర్థం"},points:{en:"Points",hi:"अंक",te:"పాయింట్లు"},dosha:{en:"Dosha",hi:"दोष",te:"దోషం"},nadiBhakoot:{en:"Nadi and Bhakoot — no dosha ✓",hi:"नाड़ी और भकूट — कोई दोष नहीं ✓",te:"నాడి, భకూట — దోషం లేదు ✓"},mangalDosha:{en:"Mangal Dosha",hi:"मंगल दोष",te:"కుజ దోషం"},cancelFactors:{en:"Cancellation factors",hi:"दोष कटने के कारण",te:"దోషం తొలగే కారణాలు"},noneSignificant:{en:"None significant ✓",hi:"कोई बड़ा कारण नहीं ✓",te:"గణనీయమైనవి లేవు ✓"},yes:{en:"Yes",hi:"हाँ",te:"అవును"},no:{en:"No",hi:"नहीं",te:"లేదు"}};
U.manglik={none:{te:"రెండు జాతకాల్లోనూ కుజ దోషం లేదు — ఈ సంబంధానికి కుజుడి వల్ల ఎలాంటి అడ్డంకీ లేదు."},neutralized:{te:"రెండు జాతకాల్లోనూ కుజ దోషం ఉంది — శాస్త్ర నియమం ప్రకారం దోషం పరస్పరం తొలగిపోతుంది."},softened:{te:"ఒక జాతకంలో కుజ దోషం ఉంది, కానీ కింద చెప్పిన శాస్త్ర పరిహార కారణాల వల్ల అది తగ్గింది; సంప్రదాయ పరిహారాలతో ఈ సంబంధం ముందుకు సాగవచ్చు."},present:{te:"ఒక జాతకంలో కుజ దోషం ఉంది, తొలగించే కారణాలేవీ లేవు — ముందుకు వెళ్లేముందు కుజ శాంతి (హనుమాన్ ఉపాసన, మంగళవార వ్రతం) చేసి పెద్దల సలహా తీసుకోవాలని సంప్రదాయం చెబుతోంది."},note:{en:"Note: Mangal Dosha strength reflects Mars’ house position and aggravating or softening factors — which is why we show it as Mild / Moderate / Strong rather than a raw number.",hi:"नोट: मंगल दोष की तीव्रता मंगल की भाव-स्थिति से आँकी जाती है; एकाधिक कारक इसे बढ़ा या घटा सकते हैं।",te:"గమనిక: కుజ దోష తీవ్రత కుజుడి భావ స్థితిని బట్టి, దాన్ని పెంచే లేదా తగ్గించే అంశాలను బట్టి లెక్కిస్తారు — అందుకే దీన్ని ఒక సంఖ్యగా కాకుండా అల్ప / మధ్యమ / తీవ్ర అని చూపిస్తున్నాం."},"Mild":{en:"Mild",hi:"अल्प",te:"అల్ప"},"Moderate":{en:"Moderate",hi:"मध्यम",te:"మధ్యమ"},"Strong":{en:"Strong",hi:"प्रबल",te:"తీవ్ర"}};
U.career={barLeadership:{en:"Leadership Ability",hi:"नेतृत्व क्षमता",te:"నాయకత్వ శక్తి"},barEntre:{en:"Entrepreneurship",hi:"अपना काम शुरू करने की क्षमता",te:"సొంత వ్యాపార శక్తి"},barWealth:{en:"Wealth Potential",hi:"धन संभावना",te:"సంపద అవకాశం"},barGovt:{en:"Govt Sector Fit",hi:"सरकारी नौकरी में सफलता",te:"ప్రభుత్వ ఉద్యోగంలో విజయం"},barPriv:{en:"Private Sector Fit",hi:"प्राइवेट सेक्टर में सफलता",te:"ప్రైవేట్ సెక్టార్‌లో విజయం"},confirmGen:{en:"If correct, generate (check AM/PM)",hi:"सही हो तो रिपोर्ट बनाएँ (AM/PM जाँचें)",te:"సరిగ్గా ఉంటే రిపోర్ట్ తయారు చేయండి (AM/PM చూడండి)"},primarySig:{en:"PRIMARY CAREER SIGNATURE",hi:"आपकी करियर पहचान",te:"మీ కెరీర్ స్వభావం"},topFields:{en:"TOP FIELDS",hi:"सबसे अच्छे क्षेत्र",te:"ఉత్తమ రంగాలు"},keyIndicators:{en:"KEY INDICATORS",hi:"मुख्य संकेत",te:"ముఖ్య సూచికలు"},leadership:{en:"Leadership",hi:"नेतृत्व",te:"నాయకత్వం"},entrepreneurship:{en:"Entrepreneurship",hi:"अपना काम",te:"సొంత వ్యాపారం"},wealth:{en:"Wealth",hi:"धन",te:"సంపద"},recommendation:{en:"RECOMMENDATION",hi:"सलाह",te:"సలహా"},leadStrong:{en:"Your leadership potential is strong — people accept your guidance naturally. Management, team-lead or founder roles suit you well.",hi:"आपमें स्वाभाविक नेतृत्व-क्षमता प्रबल है — लोग आपका मार्गदर्शन सहज स्वीकार करते हैं। प्रबंधन, टीम-नेतृत्व या संस्थापक भूमिकाएँ आपके अनुकूल हैं।",te:"మీలో సహజమైన నాయకత్వ శక్తి బలంగా ఉంది — మీ మార్గదర్శనాన్ని జనం సులభంగా అంగీకరిస్తారు. మేనేజ్‌మెంట్, టీమ్ లీడ్ లేదా వ్యవస్థాపక పాత్రలు మీకు బాగా సరిపోతాయి."},leadMid:{en:"You have solid leadership ability that grows with experience. Starting with a small team and building toward larger responsibility suits you.",hi:"आपमें अच्छी नेतृत्व-क्षमता है जो अनुभव के साथ निखरती है। छोटी टीम से आरंभ कर बड़ी ज़िम्मेदारी की ओर बढ़ना उपयुक्त रहेगा।",te:"మీలో మంచి నాయకత్వ శక్తి ఉంది, అది అనుభవంతో మెరుగవుతుంది. చిన్న టీమ్‌తో మొదలుపెట్టి పెద్ద బాధ్యతల వైపు వెళ్లడం మీకు సరిపోతుంది."},leadExpert:{en:"Your strength lies more in expertise than command — leading through deep skill is your natural path. Leadership can be learned, but you shine most as a specialist.",hi:"आपकी शक्ति नेतृत्व से अधिक विशेषज्ञता में है — गहरी दक्षता से प्रभाव बनाना आपका स्वाभाविक मार्ग है। नेतृत्व सीखा जा सकता है, पर विशेषज्ञ के रूप में आप अधिक चमकते हैं।",te:"మీ బలం ఆజ్ఞాపించడంలో కాదు, నైపుణ్యంలో ఉంది — లోతైన నైపుణ్యంతో ప్రభావం చూపడమే మీ సహజ మార్గం. నాయకత్వం నేర్చుకోవచ్చు, కానీ నిపుణుడిగానే మీరు ఎక్కువ మెరుస్తారు."},whatToDo:{en:"What to do in each period — direct guidance on putting astrology to use:",hi:"हर अवधि में क्या करें — ज्योतिष को काम में लाने की सीधी सलाह:",te:"ప్రతి కాలంలో ఏమి చేయాలి — జ్యోతిష్యాన్ని ఆచరణలో పెట్టే స్పష్టమైన సూచనలు:"},avoidFields:{en:"These fields rest mainly on the same less-supported planet(s) in your chart, which is why they group together.",hi:"ये क्षेत्र मुख्यतः उन्हीं ग्रहों पर आधारित हैं जो आपकी कुंडली में कम बली हैं — इसलिए एक साथ समूहित हैं।",te:"ఈ రంగాలు మీ జాతకంలో తక్కువ బలం ఉన్న గ్రహాల మీదే ఆధారపడతాయి — అందుకే ఇవి ఒకే గుంపుగా ఉన్నాయి."}};

    +'<div class="foot">'+T(L.verify)+'<br><b>शुभ दिन · shubhdin.app</b> · '+new Date().toLocaleDateString('en-IN')+'</div>');
  document.getElementById('report').innerHTML=H;
  var rep=document.getElementById('report');
  rep.className='lang-'+LANG;
  rep.setAttribute('lang',LANG);
  rep.style.display='block';
  document.getElementById('printbar').style.display='block';
  document.getElementById('inputScreen').style.display='none';
  window.scrollTo(0,0);
}
</script>
