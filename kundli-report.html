<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shubh Din — Kundli Report</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Devanagari:wght@400;600;700&family=Cormorant+Garamond:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#5C1A1B;--gold:#B8860B;--gold2:#D4A843;--paper:#FFFDF6;--soft:#8B5A2B;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#EFE9DC;font-family:'Noto Serif Devanagari','Cormorant Garamond',serif;color:var(--ink);}
.screen{max-width:760px;margin:24px auto;background:var(--paper);border:1px solid var(--gold2);border-radius:12px;padding:28px;}
h1.brand{font-size:26px;text-align:center;color:var(--ink);}
.sub{text-align:center;color:var(--soft);font-size:13px;margin:4px 0 18px;}
label{display:block;font-size:13px;color:var(--soft);margin:10px 0 4px;}
input,select,button{font-family:inherit;font-size:15px;padding:9px 10px;border:1px solid var(--gold2);border-radius:8px;background:#fff;color:var(--ink);width:100%;}
button{background:linear-gradient(135deg,#8B2B33,#5C1A1B);color:#FFE8C8;border:none;cursor:pointer;margin-top:16px;font-size:16px;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.confirm{background:#FFF6E3;border:1px dashed var(--gold);border-radius:10px;padding:14px;margin-top:16px;display:none;}
.confirm b{color:#8B2B33;}
.langToggle{display:flex;gap:8px;margin-top:10px;}
.langToggle button{margin:0;background:#fff;color:var(--ink);border:1px solid var(--gold2);}
.langToggle button.on{background:var(--ink);color:#FFE8C8;}
/* ---------- REPORT ---------- */
#report{display:none;}
.page{max-width:794px;margin:16px auto;background:var(--paper);padding:48px 52px;box-shadow:0 2px 14px rgba(92,26,27,0.12);position:relative;min-height:1000px;}
.page::before{content:"";position:absolute;inset:14px;border:1.5px solid var(--gold2);border-radius:4px;pointer-events:none;}
.cover{display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;}
.om{font-size:54px;color:var(--gold);}
.cover h1{font-size:38px;margin:12px 0 4px;}
.cover .name{font-size:30px;color:#8B2B33;margin:26px 0 6px;font-weight:700;}
.cover .bd{font-size:16px;color:var(--soft);}
.tagfree{margin-top:34px;font-size:14px;color:var(--gold);border-top:1px solid var(--gold2);border-bottom:1px solid var(--gold2);padding:8px 18px;}
h2.sec{font-size:22px;color:#8B2B33;border-bottom:2px solid var(--gold2);padding-bottom:6px;margin:6px 0 16px;}
table{width:100%;border-collapse:collapse;font-size:14px;margin:8px 0 18px;}
th,td{border:1px solid #E4D3AE;padding:6px 9px;text-align:left;}
th{background:#F8EFD8;color:#5C1A1B;font-weight:600;}
tr:nth-child(even) td{background:#FDF8EC;}
.prose{font-size:15.5px;line-height:1.85;text-align:justify;margin-bottom:14px;}
.cardrow{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px;}
.idcard{background:#FFF6E3;border:1px solid var(--gold2);border-radius:10px;padding:12px 14px;}
.idcard .t{font-size:12px;color:var(--soft);letter-spacing:.5px;}
.idcard .v{font-size:18px;color:#8B2B33;font-weight:700;margin-top:2px;}
.chartwrap{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin:10px 0 18px;}
.chartbox{text-align:center;}
.chartbox .cap{font-size:13px;color:var(--soft);margin-top:6px;}
.yog{background:#FDF8EC;border-left:4px solid var(--gold);padding:10px 14px;margin-bottom:10px;font-size:15px;line-height:1.7;}
.dos{background:#FFF3F0;border-left:4px solid #B8434A;padding:10px 14px;margin-bottom:10px;font-size:15px;line-height:1.7;}
.dos.ok{background:#F2F8EF;border-left-color:#5A8B2B;}
.rem{display:grid;grid-template-columns:110px 1fr;gap:10px;border:1px solid #E4D3AE;border-radius:8px;padding:10px 12px;margin-bottom:9px;font-size:14px;align-items:center;}
.rem .m{color:#8B2B33;font-weight:700;}
.foot{font-size:12.5px;color:var(--soft);border-top:1px solid var(--gold2);padding-top:10px;margin-top:22px;line-height:1.7;}
.savhot{background:#EAF3E2 !important;font-weight:700;}
.savcold{background:#F9E9E7 !important;}
.antar{font-size:12px;color:var(--soft);}
.printbar{max-width:794px;margin:10px auto;text-align:center;}
.printbar button{width:auto;padding:10px 28px;}
@media print{
  body{background:#fff;}
  .screen,.printbar{display:none !important;}
  #report{display:block !important;}
  .page{box-shadow:none;margin:0;page-break-after:always;min-height:auto;padding:34px 40px;}
  .page:last-child{page-break-after:auto;}
}
@page{size:A4;margin:10mm;}
</style>
</head>
<body>

<div class="screen" id="inputScreen">
  <h1 class="brand">🕉️ शुभ दिन — Kundli Report</h1>
  <div class="sub">Free · Drik-Ganita Accurate · No gemstone selling, ever</div>
  <div class="row">
    <div><label>Name / नाम</label><input id="pname" type="text" value="" placeholder="Full name"></div>
    <div><label>Gender / लिंग</label><select id="pgender"><option>Male</option><option>Female</option></select></div>
  </div>
  <div class="row">
    <div><label>Birth Date / जन्म तिथि</label><input id="bdate" type="date" value="1996-12-06"></div>
    <div><label>Birth Time (24h) / जन्म समय</label><input id="btime" type="time" value="15:47" step="60"></div>
  </div>
  <div class="row">
    <div><label>Latitude</label><input id="blat" type="number" step="0.0001" value="16.4343"></div>
    <div><label>Longitude</label><input id="blng" type="number" step="0.0001" value="81.6985"></div>
  </div>
  <label>Birth Place (label only) / जन्म स्थान</label><input id="bplace" type="text" value="Narasapur, AP">
  <div class="langToggle"><button id="lEn" class="on" onclick="setLang('en')">English</button><button id="lHi" onclick="setLang('hi')">हिन्दी</button></div>
  <button onclick="confirmStep()">Check Birth Details → जाँचें</button>
  <div class="confirm" id="confirmBox">
    <div id="confirmText" style="font-size:15px;line-height:1.9;"></div>
    <div class="row">
      <button style="background:#5A8B2B;" onclick="generate()">✓ Correct — Generate Report</button>
      <button style="background:#B8434A;" onclick="document.getElementById('confirmBox').style.display='none'">✗ Fix details</button>
    </div>
  </div>
</div>

<div class="printbar" id="printbar" style="display:none;"><button onclick="window.print()">🖨️ Print / Save as PDF</button></div>
<div id="report"></div>

<script src="astronomy.min.js"></script>
<script src="panchang-engine.js"></script>
<script src="report-content.js"></script>
<script>
var LANG='en', CTX=null;
function setLang(l){LANG=l;document.getElementById('lEn').className=l==='en'?'on':'';document.getElementById('lHi').className=l==='hi'?'on':'';}
function T(o){return o?(o[LANG]||o.en):'';}
var GR_HI={sun:'सूर्य',moon:'चंद्र',mars:'मंगल',mercury:'बुध',jupiter:'गुरु',venus:'शुक्र',saturn:'शनि',rahu:'राहु',ketu:'केतु'};
var GR_EN={sun:'Sun',moon:'Moon',mars:'Mars',mercury:'Mercury',jupiter:'Jupiter',venus:'Venus',saturn:'Saturn',rahu:'Rahu',ketu:'Ketu'};
function gname(k){return LANG==='hi'?GR_HI[k]:GR_EN[k];}
function dms(x){var d=Math.floor(x),m=Math.floor((x-d)*60),s=Math.round(((x-d)*60-m)*60);if(s===60){s=0;m++;}if(m===60){m=0;d++;}return d+'°'+String(m).padStart(2,'0')+'′'+String(s).padStart(2,'0')+'″';}
function ist(d){return new Date(d.getTime()+5.5*3600000);}
function fT(d){return ist(d).toISOString().slice(11,16);}
function fD(d){return ist(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric',timeZone:'UTC'});}
function birthUTC(){
  var dv=document.getElementById('bdate').value.split('-').map(Number);
  var tv=document.getElementById('btime').value.split(':').map(Number);
  return new Date(Date.UTC(dv[0],dv[1]-1,dv[2],tv[0],tv[1],0)-5.5*3600000);
}
function confirmStep(){
  var PE=window.PanchangEngine;
  var b=birthUTC(),lat=+document.getElementById('blat').value,lng=+document.getElementById('blng').value;
  var bc=PE.getBirthChart(b,lat,lng);
  var moon=bc.grahas.find(function(g){return g.key==='moon';});
  CTX={b:b,lat:lat,lng:lng,bc:bc};
  var t=(LANG==='hi')
   ?'हमारी गणना के अनुसार: <b>लग्न — '+bc.lagna.hi+'</b> · <b>चंद्र राशि — '+moon.rashi.hi+'</b> · <b>जन्म नक्षत्र — '+moon.nakshatra.hi+' (पद '+moon.nakshatra.pada+')</b>।<br>यदि यह आपके ज्ञात विवरण से मेल खाता है, तो रिपोर्ट बनाएँ। मेल न खाए तो जन्म समय AM/PM जाँचें।'
   :'By our calculation: <b>Lagna — '+bc.lagna.en+'</b> · <b>Moon sign — '+moon.rashi.en+'</b> · <b>Birth nakshatra — '+moon.nakshatra.en+' (pada '+moon.nakshatra.pada+')</b>.<br>If this matches what you know, generate the report. If not, please re-check the birth time (AM/PM is the most common mistake).';
  document.getElementById('confirmText').innerHTML=t;
  document.getElementById('confirmBox').style.display='block';
}
var SOUTH_POS={11:[1,1],0:[1,2],1:[1,3],2:[1,4],10:[2,1],3:[2,4],9:[3,1],4:[3,4],8:[4,1],7:[4,2],6:[4,3],5:[4,4]};
var GAB={sun:'Su',moon:'Mo',mars:'Ma',mercury:'Me',jupiter:'Ju',venus:'Ve',saturn:'Sa',rahu:'Ra',ketu:'Ke'};
function southSVG(lagnaR,place,title){
  var W=330,cs=W/4,s='<svg width="'+W+'" height="'+W+'" viewBox="0 0 '+W+' '+W+'" xmlns="http://www.w3.org/2000/svg">';
  s+='<rect x="1" y="1" width="'+(W-2)+'" height="'+(W-2)+'" fill="#FFFDF6" stroke="#B8860B" stroke-width="2"/>';
  for(var r=0;r<12;r++){
    var p=SOUTH_POS[r],x=(p[1]-1)*cs,y=(p[0]-1)*cs;
    s+='<rect x="'+x+'" y="'+y+'" width="'+cs+'" height="'+cs+'" fill="'+(r===lagnaR?'#F8EFD8':'none')+'" stroke="#D4A843" stroke-width="1"/>';
    if(r===lagnaR)s+='<line x1="'+x+'" y1="'+(y+14)+'" x2="'+(x+14)+'" y2="'+y+'" stroke="#8B2B33" stroke-width="1.5"/>';
    var items=place[r]||[];
    for(var i=0;i<items.length;i++){
      s+='<text x="'+(x+cs/2)+'" y="'+(y+18+i*15)+'" text-anchor="middle" font-size="12.5" font-weight="600" fill="#5C1A1B" font-family="serif">'+items[i]+'</text>';
    }
  }
  s+='<text x="'+(W/2)+'" y="'+(W/2-6)+'" text-anchor="middle" font-size="14" fill="#8B2B33" font-weight="700" font-family="serif">'+title+'</text>';
  s+='<text x="'+(W/2)+'" y="'+(W/2+14)+'" text-anchor="middle" font-size="11" fill="#8B5A2B" font-family="serif">शुभ दिन</text></svg>';
  return s;
}
function generate(){
  var PE=window.PanchangEngine,C=window.SD_CONTENT;
  var b=CTX.b,lat=CTX.lat,lng=CTX.lng,bc=CTX.bc;
  var name=document.getElementById('pname').value||'—';
  var place=document.getElementById('bplace').value||'';
  var moon=bc.grahas.find(function(g){return g.key==='moon';});
  var dayUTC=new Date(Date.UTC(ist(b).getUTCFullYear(),ist(b).getUTCMonth(),ist(b).getUTCDate(),6,0,0));
  var p=PE.getPanchang(dayUTC,lat,lng);
  var dz=PE.getVimshottariDasha(b);
  var dos=PE.getDoshas(b,lat,lng);
  var yg=PE.getYogas(b,lat,lng);
  var av=PE.getAshtakavarga(b,lat,lng);
  var L=C.labels,H='';
  function pg(inner){H+='<div class="page">'+inner+'</div>';}
  function paginateRows(headerRow,rows,perPage,title){ // chunk long tables into pages
    for(var i=0;i<rows.length;i+=perPage){
      pg('<h2 class="sec">'+title+(rows.length>perPage?' ('+(Math.floor(i/perPage)+1)+'/'+Math.ceil(rows.length/perPage)+')':'')+'</h2>'
        +'<table>'+headerRow+rows.slice(i,i+perPage).join('')+'</table>');
    }
  }
  // ---- COVER ----
  pg('<div class="cover" style="min-height:900px;">'
    +'<div class="om">ॐ</div><h1>'+T(L.reportTitle)+'</h1>'
    +'<div class="sub" style="font-size:15px;">'+T(L.by)+'</div>'
    +'<div class="name">'+name+'</div>'
    +'<div class="bd">'+fD(b)+' · '+fT(b)+' IST<br>'+place+' ('+lat.toFixed(4)+', '+lng.toFixed(4)+')</div>'
    +'<div class="cardrow" style="margin-top:34px;width:100%;">'
    +'<div class="idcard"><div class="t">'+T(L.yourLagna)+'</div><div class="v">'+(LANG==='hi'?bc.lagna.hi:bc.lagna.en)+' '+dms(bc.lagna.degreesInRashi)+'</div></div>'
    +'<div class="idcard"><div class="t">'+T(L.yourNak)+'</div><div class="v">'+(LANG==='hi'?moon.nakshatra.hi:moon.nakshatra.en)+' · '+(LANG==='hi'?moon.rashi.hi:moon.rashi.en)+'</div></div>'
    +'</div><div class="tagfree">'+T(L.free)+'</div></div>');
  // ---- TOC ----
  var tocItems=(LANG==='hi')
    ?['जन्म पंचांग','कुंडली चक्र (D1 · D9)','ग्रह स्थिति','सर्वाष्टकवर्ग','आपका नक्षत्र एवं लग्न','शुभ योग','दोष विश्लेषण','शनि साढ़े साती','विंशोत्तरी दशा क्रम','संपूर्ण जीवन दशा सारणी (प्रत्यंतर स्तर)','भिन्नाष्टकवर्ग सारणियाँ','उपाय — साधना रूप में']
    :['Birth Panchang','Kundli Charts (D1 · D9)','Planetary Positions','Sarvashtakavarga','Your Nakshatra & Lagna','Auspicious Yogas','Dosha Analysis','Shani Sade Sati','Vimshottari Dasha Timeline','Full-Life Period Tables (Pratyantar level)','Bhinnashtakavarga Tables','Remedies as Sadhana'];
  pg('<h2 class="sec">'+(LANG==='hi'?'विषय-सूची':'Table of Contents')+'</h2><table>'
    +tocItems.map(function(t,i){return '<tr><th style="width:60px;text-align:center;">'+(i+1)+'</th><td>'+t+'</td></tr>';}).join('')
    +'</table><div class="prose" style="font-size:13px;color:#8B5A2B;">'
    +(LANG==='hi'?'यह रिपोर्ट '+name+' के लिए दृक्-गणित से व्यक्तिगत रूप से गणना की गई है।':'This report is individually computed for '+name+' using Drik Ganita.')+'</div>');
  // ---- BIRTH PANCHANG ----
  var hc=p.hinduCalendar;
  var rows=[[LANG==='hi'?'सूर्योदय / सूर्यास्त':'Sunrise / Sunset',fT(p.sunrise)+' / '+fT(p.sunset)],
    [LANG==='hi'?'तिथि':'Tithi',(LANG==='hi'?p.tithi.segments[0].hi:p.tithi.segments[0].en)+' ('+p.tithi.paksha+')'],
    [LANG==='hi'?'नक्षत्र':'Nakshatra',LANG==='hi'?moon.nakshatra.hi:moon.nakshatra.en],
    [LANG==='hi'?'योग':'Yoga',LANG==='hi'?p.yoga.segments[0].hi:p.yoga.segments[0].en],
    [LANG==='hi'?'करण':'Karana',LANG==='hi'?p.karana.segments[0].hi:p.karana.segments[0].en],
    [LANG==='hi'?'चंद्र राशि / सूर्य राशि':'Moon sign / Sun sign',(LANG==='hi'?moon.rashi.hi:moon.rashi.en)+' / '+(LANG==='hi'?p.sunSign.hi:p.sunSign.en)],
    [LANG==='hi'?'अमांत / पूर्णिमांत मास':'Amanta / Purnimanta month',(LANG==='hi'?hc.amantaMonth.hi:hc.amantaMonth.en)+' / '+(LANG==='hi'?hc.purnimantaMonth.hi:hc.purnimantaMonth.en)],
    [LANG==='hi'?'विक्रम संवत्':'Vikram Samvat',hc.vikramSamvat+' '+hc.samvatsara.vikram],
    [LANG==='hi'?'शक संवत्':'Shaka Samvat',hc.shakaSamvat+' '+hc.samvatsara.shaka]];
  var tb='<table>'+rows.map(function(r){return '<tr><th style="width:42%">'+r[0]+'</th><td>'+r[1]+'</td></tr>';}).join('')+'</table>';
  // charts
  var d1p={},d9p={};
  bc.grahas.forEach(function(g){var tag=GAB[g.key]+(g.retrograde?'ᴿ':'');(d1p[g.rashi.index]=d1p[g.rashi.index]||[]).push(tag);(d9p[g.navamsa.rashiIndex]=d9p[g.navamsa.rashiIndex]||[]).push(tag);});
  pg('<h2 class="sec">'+T(L.birthPanchang)+'</h2>'+tb
    +'<h2 class="sec">'+T(L.charts)+'</h2><div class="chartwrap">'
    +'<div class="chartbox">'+southSVG(bc.lagna.rashiIndex,d1p,'D1 · Rashi')+'<div class="cap">Lagna: '+(LANG==='hi'?bc.lagna.hi:bc.lagna.en)+'</div></div>'
    +'<div class="chartbox">'+southSVG(bc.navamsaLagna.rashiIndex,d9p,'D9 · Navamsa')+'<div class="cap">Navamsa Lagna: '+(LANG==='hi'?bc.navamsaLagna.hi:bc.navamsaLagna.en)+'</div></div></div>');
  // ---- POSITIONS + SAV ----
  var dig={}; yg.dignities.forEach(function(d){dig[d.key]=d.dignity;});
  var pos='<table><tr><th>'+(LANG==='hi'?'ग्रह':'Graha')+'</th><th>'+T(L.rashiW)+'</th><th>°</th><th>'+(LANG==='hi'?'नक्षत्र':'Nakshatra')+'</th><th>'+T(L.house)+'</th><th></th></tr>';
  bc.grahas.forEach(function(g){
    pos+='<tr><td>'+gname(g.key)+'</td><td>'+(LANG==='hi'?g.rashi.hi:g.rashi.en)+'</td><td>'+dms(g.degreesInRashi)+'</td><td>'+(LANG==='hi'?g.nakshatra.hi:g.nakshatra.en)+' p'+g.nakshatra.pada+'</td><td>'+g.house+'</td><td>'+[(g.retrograde?(LANG==='hi'?'वक्री':'Retro'):''),(g.combust?(LANG==='hi'?'अस्त':'Combust'):''),(dig[g.key]||'')].filter(Boolean).join(' · ')+'</td></tr>';
  });
  pos+='</table>';
  var mx=Math.max.apply(null,av.sav),mn=Math.min.apply(null,av.sav);
  var savT='<table><tr>'+bc.d1.map(function(h){return '<th>'+(LANG==='hi'?h.hi:h.en).slice(0,6)+'</th>';}).join('')+'</tr><tr>'
    +bc.d1.map(function(h){var v=av.sav[h.rashiIndex];var cl=v>=30?' class="savhot"':(v<=22?' class="savcold"':'');return '<td'+cl+'>'+v+'</td>';}).join('')+'</tr></table>'
    +'<div class="prose" style="font-size:13px;color:#8B5A2B;">'+(LANG==='hi'?'30+ बिंदु वाले भाव जीवन के प्रबल क्षेत्र हैं; 22 से कम वाले भावों में सचेत प्रयास फलदायी होता है। (कुल 337 — शास्त्रीय मानक)':'Houses scoring 30+ are your power zones; those below 22 reward conscious effort. (Grand total 337 — the classical checksum.)')+'</div>';
  pg('<h2 class="sec">'+T(L.positions)+'</h2>'+pos+'<h2 class="sec">'+T(L.ashtak)+'</h2>'+savT);
  // ---- NAKSHATRA + LAGNA PERSONALITY ----
  pg('<h2 class="sec">'+T(L.yourNak)+' — '+(LANG==='hi'?moon.nakshatra.hi:moon.nakshatra.en)+'</h2>'
    +'<div class="prose">'+T(C.nakshatra[moon.nakshatra.index])+'</div>'
    +'<h2 class="sec">'+T(L.yourLagna)+' — '+(LANG==='hi'?bc.lagna.hi:bc.lagna.en)+'</h2>'
    +'<div class="prose">'+T(C.lagna[bc.lagna.rashiIndex])+'</div>');
  // ---- GRAHA PHAL (planet-in-house readings, 9 blocks) ----
  var gpBlocks=bc.grahas.map(function(g2){
    var arr=C.grahaBhava[g2.key]; var txt=arr?arr[g2.house-1]:null;
    return '<div class="yog" style="border-left-color:#B8860B;">'
      +'<b>'+gname(g2.key)+' — '+(LANG==='hi'?'भाव':'House')+' '+g2.house+' ('+(LANG==='hi'?g2.rashi.hi:g2.rashi.en)+')</b><br>'
      +(txt?T(txt):'')+'</div>';
  });
  pg('<h2 class="sec">'+(LANG==='hi'?'ग्रह फल — भाव स्थिति':'Graha Phala — House Placements')+'</h2>'+gpBlocks.slice(0,5).join(''));
  pg('<h2 class="sec" style="font-size:17px;">'+(LANG==='hi'?'ग्रह फल (क्रमशः)':'Graha Phala (contd.)')+'</h2>'+gpBlocks.slice(5).join(''));
  // ---- YOGAS + DOSHAS ----
  var yogHtml=yg.presentYogas.map(function(y){var txt=C.yoga[y.key];return '<div class="yog">✦ <b>'+y.en+'</b><br>'+(txt?T(txt):y.detail)+'</div>';}).join('')||'<div class="prose">—</div>';
  var m=dos.manglik,ks=dos.kaalSarp,ss=dos.sadeSati;
  var dosHtml='';
  dosHtml+='<div class="dos'+(m.present?'':' ok')+'"><b>'+(LANG==='hi'?'मंगल दोष':'Mangal Dosha')+':</b> '+(m.present?T(C.dosha.manglikYes)+' ('+m.percent+'%)':T(C.dosha.manglikNo))+'</div>';
  dosHtml+='<div class="dos'+(ks.present?'':' ok')+'"><b>'+(LANG==='hi'?'कालसर्प':'Kaal Sarpa')+':</b> '+(ks.present?T(C.dosha.kaalSarpYes).replace('{type}',ks.type):T(C.dosha.kaalSarpNo))+'</div>';
  dosHtml+='<div class="dos'+(ss.active?'':' ok')+'"><b>'+(LANG==='hi'?'साढ़े साती':'Sade Sati')+':</b> '+(ss.active?T(C.dosha.sadeSatiActive).replace('{phase}',ss.currentPhase):T(C.dosha.sadeSatiNo))+'</div>';
  var ssT='<table><tr><th>'+(LANG==='hi'?'चरण':'Phase')+'</th><th>'+T(L.from)+'</th><th>'+T(L.to)+'</th></tr>'
    +ss.periods.map(function(x){return '<tr><td>'+x.phase+' ('+(LANG==='hi'?x.hi:x.en)+')</td><td>'+fD(x.start)+'</td><td>'+fD(x.end)+'</td></tr>';}).join('')+'</table>';
  pg('<h2 class="sec">'+T(L.yogasFound)+'</h2>'+yogHtml
    +'<h2 class="sec">'+T(L.doshas)+'</h2>'+dosHtml
    +'<h2 class="sec">'+T(L.sadeSati)+'</h2>'+ssT);
  // ---- DASHA ----
  var cur=dz.mahadashas.find(function(md){return md.start<=new Date()&&md.end>new Date();});
  var dT='<table><tr><th>'+(LANG==='hi'?'महादशा':'Mahadasha')+'</th><th>'+T(L.from)+'</th><th>'+T(L.to)+'</th></tr>';
  dz.mahadashas.forEach(function(md){
    var isCur=cur&&md.lord===cur.lord;
    dT+='<tr'+(isCur?' style="background:#F8EFD8;font-weight:700;"':'')+'><td>'+gname(md.lord)+(md.balance?' ('+(LANG==='hi'?'शेष':'balance')+' '+dz.balanceYears.toFixed(2)+'y)':'')+'</td><td>'+fD(md.start)+'</td><td>'+fD(md.end)+'</td></tr>';
    if(isCur){dT+='<tr><td colspan="3" class="antar">'+md.antardashas.map(function(a){return gname(md.lord)+'–'+gname(a.lord)+': '+fD(a.start)+'→'+fD(a.end);}).join(' · ')+'</td></tr>';}
  });
  dT+='</table>';
  var curTxt=cur?('<h2 class="sec">'+T(L.currentDasha)+' — '+gname(cur.lord)+'</h2><div class="prose">'+T(C.dashaLord[cur.lord])+'</div>'):'';
  pg('<h2 class="sec">'+T(L.dashaTimeline)+'</h2><div class="prose" style="font-size:13px;color:#8B5A2B;">'+(LANG==='hi'?'जन्म नक्षत्र':'Birth nakshatra')+': '+(LANG==='hi'?dz.birthNakshatra.hi:dz.birthNakshatra.en)+'</div>'+dT+curTxt);
  // ---- DASHA PREDICTION CHAPTERS (maha intro + dated antar prose) ----
  dz.mahadashas.forEach(function(md){
    var head='<h2 class="sec">'+(LANG==='hi'?'दशा फल — ':'Period Predictions — ')+gname(md.lord)+' '+(LANG==='hi'?'महादशा':'Mahadasha')+'</h2>'
      +'<div class="prose" style="font-size:13px;color:#8B5A2B;">'+fD(md.start)+' → '+fD(md.end)+'</div>'
      +'<div class="prose">'+T(C.dashaLord[md.lord])+'</div>';
    var blocks=md.antardashas.map(function(a){
      var key=md.lord+'-'+a.lord, txt=C.antar[key];
      return '<div class="yog" style="border-left-color:#8B5A2B;background:#FDF8EC;">'
        +'<b>'+gname(md.lord)+' – '+gname(a.lord)+'</b> <span style="font-size:12px;color:#8B5A2B;">('+fD(a.start)+' → '+fD(a.end)+')</span><br>'
        +(txt?T(txt):'')+'</div>';
    });
    pg(head+blocks.slice(0,4).join(''));
    if(blocks.length>4)pg('<h2 class="sec" style="font-size:17px;">'+gname(md.lord)+' '+(LANG==='hi'?'महादशा (क्रमशः)':'Mahadasha (contd.)')+'</h2>'+blocks.slice(4).join(''));
  });
  // ---- FULL-LIFE PERIOD TABLES (pratyantar level, 729 rows) ----
  var prHeader='<tr><th>'+(LANG==='hi'?'दशा – अंतर – प्रत्यंतर':'Maha – Antar – Pratyantar')+'</th><th>'+T(L.from)+'</th><th>'+T(L.to)+'</th></tr>';
  dz.mahadashas.forEach(function(md){
    var rows=[];
    md.antardashas.forEach(function(a){
      var prs=PE.dashaSubPeriods(a.lord,a.start.getTime(),a.end.getTime());
      prs.forEach(function(pr,pi){
        if(pr.end.getTime()<=a.start.getTime())return;
        rows.push('<tr'+(pi===0?' style="border-top:2px solid #D4A843;"':'')+'><td>'+gname(md.lord)+' – '+gname(a.lord)+' – '+gname(pr.lord)+'</td><td>'+fD(pr.start)+'</td><td>'+fD(pr.end)+'</td></tr>');
      });
    });
    paginateRows(prHeader,rows,41,(LANG==='hi'?'जीवन दशा सारणी — ':'Life Period Table — ')+gname(md.lord)+' '+(LANG==='hi'?'महादशा':'Mahadasha')+' ('+fD(md.start)+' → '+fD(md.end)+')');
  });
  // ---- FULL BHINNASHTAKAVARGA TABLES ----
  var CONTRIB=['sun','moon','mars','mercury','jupiter','venus','saturn'];
  var CLAB=LANG==='hi'?{sun:'सूर्य',moon:'चंद्र',mars:'मंगल',mercury:'बुध',jupiter:'गुरु',venus:'शुक्र',saturn:'शनि',lagna:'लग्न'}:{sun:'Sun',moon:'Moon',mars:'Mars',mercury:'Mer',jupiter:'Jup',venus:'Ven',saturn:'Sat',lagna:'Lag'};
  var bavPages='';
  CONTRIB.forEach(function(tk,ti){
    var B=av.bav[tk];
    var t2='<table style="font-size:12px;"><tr><th>'+(LANG==='hi'?'दाता':'From')+'</th>'+bc.d1.map(function(){return '';}).join('');
    t2='<table style="font-size:12px;"><tr><th>'+(LANG==='hi'?'दाता':'From')+'</th>';
    for(var r=0;r<12;r++){t2+='<th style="text-align:center;">'+(LANG==='hi'?['मे','वृ','मि','क','सिं','कन','तु','वृश','ध','मक','कुं','मी'][r]:['Ar','Ta','Ge','Ca','Le','Vi','Li','Sc','Sg','Cp','Aq','Pi'][r])+'</th>';}
    t2+='</tr>';
    ['sun','moon','mars','mercury','jupiter','venus','saturn','lagna'].forEach(function(ck){
      t2+='<tr><th>'+CLAB[ck]+'</th>';
      for(var r2=0;r2<12;r2++)t2+='<td style="text-align:center;">'+(B.rows[ck][r2]||'·')+'</td>';
      t2+='</tr>';
    });
    t2+='<tr style="font-weight:700;"><th>'+(LANG==='hi'?'योग':'Total')+'</th>';
    for(var r3=0;r3<12;r3++)t2+='<td style="text-align:center;background:#F8EFD8;">'+B.perRashi[r3]+'</td>';
    t2+='</tr></table>';
    bavPages+='<h2 class="sec" style="font-size:17px;">'+(LANG==='hi'?'भिन्नाष्टकवर्ग — ':'Bhinnashtakavarga — ')+gname(tk)+' ('+B.total+')</h2>'+t2;
    if(ti%2===1||ti===CONTRIB.length-1){pg(bavPages);bavPages='';}
  });
  // ---- GOCHARA TRANSIT TABLES (10 years, dated) ----
  var now=new Date(); var tEnd=new Date(now.getTime()+10*365.25*86400000);
  var moonR=moon.rashi.index;
  [['jupiter',LANG==='hi'?'गुरु गोचर':'Jupiter Transit'],['saturn',LANG==='hi'?'शनि गोचर':'Saturn Transit'],['rahu',LANG==='hi'?'राहु गोचर':'Rahu Transit']].forEach(function(tp){
    var segs=PE.getTransitPeriods(tp[0],now,tEnd);
    var rows=segs.map(function(s2){
      var hm=((s2.rashiIndex-moonR+12)%12)+1;
      return '<tr><td>'+(LANG==='hi'?s2.hi:s2.en)+'</td><td>'+fD(s2.start)+'</td><td>'+fD(s2.end)+'</td><td style="text-align:center;">'+hm+'</td></tr>';
    });
    paginateRows('<tr><th>'+T(L.rashiW)+'</th><th>'+T(L.from)+'</th><th>'+T(L.to)+'</th><th>'+(LANG==='hi'?'चंद्र से भाव':'House from Moon')+'</th></tr>',rows,41,tp[1]+' — '+(LANG==='hi'?'आगामी 10 वर्ष':'Next 10 Years'));
  });
  // ---- BIRTH-DAY TIME TABLES (hora, choghadiya, lagna) ----
  try{
    var hRows=p.hora.map(function(x){return '<tr><td>'+gname(x.key||x.lord||'')+(x.en&&!x.key?x.en:'')+'</td><td>'+fT(x.start)+'</td><td>'+fT(x.end)+'</td></tr>';});
    if(p.hora[0]&&!p.hora[0].key&&p.hora[0].en){hRows=p.hora.map(function(x){return '<tr><td>'+(LANG==='hi'?(x.hi||x.en):x.en)+'</td><td>'+fT(x.start)+'</td><td>'+fT(x.end)+'</td></tr>';});}
    paginateRows('<tr><th>'+(LANG==='hi'?'होरा':'Hora')+'</th><th>'+T(L.from)+'</th><th>'+T(L.to)+'</th></tr>',hRows,26,(LANG==='hi'?'जन्म-दिवस होरा सारणी':'Birth-Day Hora Table'));
  }catch(e){}
  try{
    var lt=PE.getLagnaTable(dayUTC,lat,lng);
    var lRows=lt.map(function(x){return '<tr'+(x.rashiIndex===bc.lagna.rashiIndex?' style="background:#F8EFD8;font-weight:700;"':'')+'><td>'+(LANG==='hi'?x.hi:x.en)+'</td><td>'+fT(x.start)+'</td><td>'+fT(x.end)+'</td></tr>';});
    var cRows=[]; (p.choghadiya.day||[]).concat(p.choghadiya.night||[]).forEach(function(x){cRows.push('<tr><td>'+(LANG==='hi'?(x.hi||x.en):x.en)+'</td><td>'+fT(x.start)+'</td><td>'+fT(x.end)+'</td></tr>');});
    pg('<h2 class="sec">'+(LANG==='hi'?'जन्म-दिवस लग्न सारणी':'Birth-Day Lagna Table')+'</h2><table><tr><th>'+(LANG==='hi'?'लग्न':'Lagna')+'</th><th>'+T(L.from)+'</th><th>'+T(L.to)+'</th></tr>'+lRows.join('')+'</table>'
      +'<div class="prose" style="font-size:13px;color:#8B5A2B;">'+(LANG==='hi'?'आपके जन्म-क्षण का लग्न चिह्नित है।':'Your birth-moment lagna is highlighted.')+'</div>');
    if(cRows.length)pg('<h2 class="sec">'+(LANG==='hi'?'जन्म-दिवस चौघड़िया':'Birth-Day Choghadiya')+'</h2><table><tr><th></th><th>'+T(L.from)+'</th><th>'+T(L.to)+'</th></tr>'+cRows.join('')+'</table>');
  }catch(e){}
  // ---- REMEDIES + FOOTER ----
  var remKeys=['sun','moon','mars','mercury','jupiter','venus','saturn','rahu','ketu'];
  var remH=remKeys.map(function(k){var r=C.remedy[k];return '<div class="rem"><div><b>'+r.name+'</b><br><span class="m">'+r.mantra+'</span></div><div>'+(LANG==='hi'?r.hi:r.en)+'</div></div>';}).join('');
  pg('<h2 class="sec">'+T(L.remedies)+'</h2><div class="prose" style="color:#5A8B2B;">'+T(L.remedyNote)+'</div>'+remH
    +'<div class="foot">'+T(L.verify)+'<br><b>शुभ दिन · shubhdin.app</b> · '+new Date().toLocaleDateString('en-IN')+'</div>');
  document.getElementById('report').innerHTML=H;
  document.getElementById('report').style.display='block';
  document.getElementById('printbar').style.display='block';
  document.getElementById('inputScreen').style.display='none';
  window.scrollTo(0,0);
}
</script>
</body>
</html>
