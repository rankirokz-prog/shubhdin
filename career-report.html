<head>

<style>
:root{--ink:#5C1A1B;--gold:#B8860B;--gold2:#D4A843;--paper:#FFFDF6;--soft:#8B5A2B;--saffron:#E8730C;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important;}
body{background:#EFE9DC;font-family:'Noto Serif Devanagari',serif;color:var(--ink);}
.screen{max-width:720px;margin:24px auto;background:var(--paper);border:1px solid var(--gold2);border-radius:12px;padding:28px;}
h1.brand{font-size:24px;text-align:center;}
.sub{text-align:center;color:var(--soft);font-size:13px;margin:4px 0 16px;}
label{display:block;font-size:12px;color:var(--soft);margin:8px 0 3px;}
input,select,button{font-family:inherit;font-size:14px;padding:8px 9px;border:1px solid var(--gold2);border-radius:8px;background:#fff;color:var(--ink);width:100%;}
button{background:linear-gradient(135deg,#8B2B33,#5C1A1B);color:#FFE8C8;border:none;cursor:pointer;margin-top:14px;font-size:15px;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.confirm{background:#FFF6E3;border:1px dashed var(--gold);border-radius:10px;padding:12px;margin-top:14px;display:none;font-size:14px;line-height:1.8;}
.langToggle{display:flex;gap:8px;margin-top:8px;}
.langToggle button{margin:0;background:#fff;color:var(--ink);border:1px solid var(--gold2);}
.langToggle button.on{background:var(--ink);color:#FFE8C8;}
#report{display:none;}
.page{max-width:794px;margin:16px auto;background:var(--paper);padding:46px 50px;box-shadow:0 2px 14px rgba(92,26,27,.12);position:relative;min-height:1000px;}
.page::before{content:"";position:absolute;inset:14px;border:1.5px solid var(--gold2);border-radius:4px;pointer-events:none;}
.cover{display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;}
h2.sec{font-size:21px;color:var(--saffron);border-bottom:2px solid var(--gold2);padding-bottom:6px;margin:6px 0 14px;}
table{width:100%;border-collapse:collapse;font-size:13.5px;margin:8px 0 16px;}
th,td{border:1px solid #E4D3AE;padding:6px 8px;text-align:left;}
th{background:#F8EFD8;font-weight:600;}
tr:nth-child(even) td{background:#FDF8EC;}
.prose{font-size:15px;line-height:1.85;text-align:justify;margin-bottom:12px;}
.idcard{background:#FFF6E3;border:1px solid var(--gold2);border-radius:10px;padding:12px 14px;margin-bottom:12px;}
.idcard .t{font-size:11.5px;color:var(--soft);}
.idcard .v{font-size:18px;color:#8B2B33;font-weight:700;margin-top:2px;}
.yog{background:#FDF8EC;border-left:4px solid var(--gold);padding:10px 13px;margin-bottom:10px;font-size:14.5px;line-height:1.75;}
.ok{background:#F2F8EF;border-left-color:#5A8B2B;}
.fieldrow{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px dashed #E4D3AE;font-size:15px;}
.fieldrow .rank{width:26px;height:26px;border-radius:50%;background:var(--saffron);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
.foot{font-size:12px;color:var(--soft);border-top:1px solid var(--gold2);padding-top:10px;margin-top:20px;line-height:1.7;}
.printbar{max-width:794px;margin:10px auto;text-align:center;}
.printbar button{width:auto;padding:10px 26px;}
@media print{body{background:#fff;}.screen,.printbar{display:none !important;}#report{display:block !important;}
.page{box-shadow:none;margin:0;page-break-after:always;min-height:auto;padding:34px 40px;}.page:last-child{page-break-after:auto;}}
@page{size:A4;margin:10mm;}

/* devanagari-print-safety: letter-spacing splits matras/conjuncts (दि ल). Never apply to Indic text. */
body,.page,.prose,.idcard,.yog,td,th,h1,h2,div,span{letter-spacing:normal;}
.stars,.scorepill{letter-spacing:2px;}
@media print{*{-webkit-font-feature-settings:"liga" 1,"kern" 1;font-feature-settings:"liga" 1,"kern" 1;}}

/* ── DEVANAGARI SHAPING SAFETY ──────────────────────────────────────────────
   A Latin-first font stack (e.g. 'Cormorant Garamond' first) forces the browser
   into PER-CHARACTER font fallback for Hindi. Shaping a syllable cluster across
   two font runs splits matras/conjuncts:  करियर → "करि यर",  बातचीत → "बा तची त".
   Fix: when the report renders in Hindi, use ONE complete Devanagari font for
   everything, and disable anything that can insert space inside a cluster. */
#report.lang-hi, #report.lang-hi *{
  font-family:'Noto Serif Devanagari','Nirmala UI','Mangal','Kokila',serif !important;
  letter-spacing:normal !important;
  word-spacing:normal !important;
  word-break:normal !important;
  overflow-wrap:normal !important;
  font-synthesis:none;               /* faux-bold can break conjunct shaping */
  text-rendering:optimizeLegibility;
}
#report.lang-hi .prose{text-align:left;}   /* justify stretches Indic awkwardly */
@media print{
  #report.lang-hi, #report.lang-hi *{
    font-family:'Noto Serif Devanagari','Nirmala UI','Mangal',serif !important;
    letter-spacing:normal !important;
  }
}

/* Telugu: same single-font shaping law as Devanagari (§10.2 / §T6) */
#report.lang-te, #report.lang-te *{
  font-family:'Noto Serif Telugu','Gautami','Nirmala UI',serif !important;
  letter-spacing:normal !important; word-spacing:normal !important;
  word-break:normal !important; overflow-wrap:normal !important;
  font-synthesis:none; text-rendering:optimizeLegibility;
}
#report.lang-te .prose{text-align:left;}
@media print{#report.lang-te, #report.lang-te *{
  font-family:'Noto Serif Telugu','Gautami','Nirmala UI',serif !important;letter-spacing:normal !important;}}
</style>
</head>

U.love={loveChart:{en:"YOUR LOVE CHART",hi:"आपकी प्रेम कुंडली",te:"మీ ప్రేమ జాతకం"},heartUpClose:{en:"Your Heart, Up Close",hi:"आपका दिल, क़रीब से",te:"మీ మనసు — దగ్గరగా"},dnaSignature:{en:"Your relationship personality, derived from your birth chart.",hi:"आपका प्रेम व्यक्तित्व — आपकी जन्म कुंडली से लिया गया।",te:"మీ జన్మ జాతకాన్ని ఆధారంగా చేసుకుని రూపొందించిన మీ ప్రేమ వ్యక్తిత్వం."},revealCheck:{en:"If correct, reveal your love story (check AM/PM)",hi:"सही हो तो प्रेम कहानी देखें (AM/PM जाँचें)",te:"సరిగ్గా ఉంటే మీ ప్రేమ కథ చూడండి (AM/PM చూడండి)"},correctReveal:{en:"✓ Correct — Reveal",hi:"✓ सही है — दिखाएँ",te:"✓ సరైనది — చూపించండి"},moonRestsPre:{en:"Your Moon rests in ",hi:"आपका चंद्रमा ",te:"మీ చంద్రుడు "},moonRestsPost:{en:" — the deep language of your heart. While your outward love expression is ",hi:"में है — यही आपके दिल की गहरी भाषा है। आपके प्यार जताने का तरीक़ा ",te:"లో ఉన్నారు — ఇదే మీ మనసు లోతైన భాష. మీరు ప్రేమను బయటికి చూపించే తీరు "},moonMid:{en:" in nature, your inner heart feels in a ",hi:"स्वभाव का है, जबकि आपका मन ",te:"స్వభావానికి చెందినది, కానీ మీ మనసు లోపల "},moonEnd:{en:" way. The meeting of these two gives your love both depth and colour.",hi:"स्वभाव से महसूस करता है। इन दोनों का मेल आपके प्यार को गहराई भी देता है और रंग भी।",te:" స్వభావంతో అనుభవిస్తుంది. ఈ రెండింటి కలయికే మీ ప్రేమకు లోతునూ, అందాన్నీ ఇస్తుంది."},venusStrong:{en:"Your Venus is especially strong — love, attraction and beauty flow naturally through your life.",hi:"आपका शुक्र बहुत मज़बूत है — प्यार, आकर्षण और सुंदरता आपकी ज़िंदगी में सहज बहते हैं।",te:"మీ జాతకంలో శుక్రుడు బలంగా ఉన్నాడు — ప్రేమ, ఆకర్షణ, అందం మీ జీవితంలో సహజంగా ప్రవహిస్తాయి."},venusWeak:{en:"Your Venus rests in a tender placement — offering white or pink flowers on Fridays and cultivating beauty strengthens it.",hi:"आपका शुक्र थोड़ी कोमल स्थिति में है — शुक्रवार को सफ़ेद या गुलाबी फूल चढ़ाना और सुंदरता को अपनाना इसे मज़बूत करता है।",te:"మీ జాతకంలో శుక్రుడు కొంచెం సున్నితమైన స్థితిలో ఉన్నాడు — శుక్రవారం తెలుపు లేదా గులాబీ పూలు సమర్పించడం, అందాన్ని ఆదరించడం దీన్ని బలపరుస్తుంది."},venusNeutral:{en:"Your Venus holds a balanced placement, giving love a steady foundation.",hi:"आपका शुक्र संतुलित स्थिति में है, जो प्यार को मज़बूत नींव देता है।",te:"మీ జాతకంలో శుక్రుడు సమతుల్య స్థితిలో ఉన్నాడు, ఇది ప్రేమకు స్థిరమైన పునాది ఇస్తుంది."},venusRemedyIntro:{en:"Venus is the planet of love, beauty and sweetness. Honouring it brings tenderness to your relationships:",hi:"शुक्र प्यार, सुंदरता और मिठास का ग्रह है। इसे प्रसन्न रखना रिश्तों में मिठास लाता है:",te:"శుక్రుడు ప్రేమ, అందం, మాధుర్యానికి అధిపతి. ఆయనను ఆరాధించడం బంధాల్లో మాధుర్యాన్ని తెస్తుంది:"},closingQuote:{en:"\"The stars incline; they do not compel. Your open heart writes the truest love story of all.\"",hi:"\"सितारे राह दिखाते हैं, मजबूर नहीं करते। सबसे सच्ची प्रेम कहानी आपका खुला दिल ही लिखता है।\"",te:"\"గ్రహాలు దారి చూపిస్తాయి, బలవంతం చేయవు. అత్యంత నిజమైన ప్రేమ కథను రాసేది మీ తెరిచిన మనసే.\""}};
U.reason={d7fifth:{en:"D7 5th lord",hi:"सप्तांश पंचमेश",te:"సప్తాంశ పంచమాధిపతి"},d7lagna:{en:"D7 lagna lord",hi:"सप्तांश लग्नेश",te:"సప్తాంశ లగ్నాధిపతి"},occupies5:{en:"occupies your 5th house",hi:"आपके पाँचवें भाव में स्थित",te:"మీ ఐదవ భావంలో ఉన్నారు"},fifthLordRole:{en:"lord of your 5th house",hi:"आपके पाँचवें भाव का स्वामी",te:"మీ ఐదవ భావ అధిపతి"},ageWindow:{en:"Within the traditional age window",hi:"पारंपरिक आयु-सीमा के भीतर",te:"సంప్రదాయ వయో పరిధిలో"},antarLord:{en:"Antar lord",hi:"अंतर्दशा स्वामी",te:"అంతర్దశ అధిపతి"},mahaLord:{en:"Maha lord",hi:"महादशा स्वामी",te:"మహాదశ అధిపతి"},jupTransit:{en:"Jupiter transits house",hi:"गुरु गोचर भाव",te:"గురు గోచారం భావం"},fromMoon:{en:"from your Moon",hi:"आपके चंद्र से",te:"మీ చంద్రుని నుండి"},seventhLord:{en:"lord of your 7th house",hi:"आपके सातवें भाव का स्वामी",te:"మీ ఏడవ భావ అధిపతి"},karaka:{en:"natural karaka",hi:"नैसर्गिक कारक",te:"సహజ కారకుడు"},occupies:{en:"occupies your 7th house",hi:"आपके सातवें भाव में स्थित",te:"మీ ఏడవ భావంలో ఉన్నారు"},d9lagna:{en:"D9 lagna lord",hi:"नवांश लग्नेश",te:"నవాంశ లగ్నాధిపతి"},d9seventh:{en:"D9 7th lord",hi:"नवांश सप्तमेश",te:"నవాంశ సప్తమాధిపతి"}};
U.remedy={sun:{te:"ఆదివారం సూర్యుడికి నమస్కరించండి, ఉదయపు ఎండలో కొద్దిసేపు నిలబడండి. ఆత్మవిశ్వాసం, గౌరవం పెరుగుతాయి."},moon:{te:"సోమవారం శివుడిని ఆరాధించండి, తెల్లని వస్తువులు దానం చేయండి. మనసుకు ప్రశాంతత కలుగుతుంది."},mars:{te:"మంగళవారం హనుమంతుడిని ఆరాధించండి, ఓపికను అలవరచుకోండి. ధైర్యం సరైన దిశలో పని చేస్తుంది."},mercury:{te:"బుధవారం విష్ణువును స్మరించండి, పచ్చని వస్తువులు దానం చేయండి. మాటలో, వ్యవహారంలో స్పష్టత వస్తుంది."},jupiter:{te:"గురువారం గురువును ఆరాధించండి, పసుపు పచ్చని వస్తువులు దానం చేయండి, పెద్దలను గౌరవించండి. జ్ఞానం, అదృష్టం పెరుగుతాయి."},venus:{te:"శుక్రవారం లక్ష్మీదేవిని ఆరాధించండి, తెలుపు లేదా గులాబీ పూలు సమర్పించండి, అందాన్ని ఆదరించండి, ఉదారంగా ఇవ్వండి. ప్రేమలో, బంధాల్లో మాధుర్యం పెరుగుతుంది."},saturn:{te:"శనివారం శనిదేవుడిని ఆరాధించండి, నల్ల నువ్వులు దానం చేయండి, పేదలకు సాయం చేయండి. ఓపిక ఫలిస్తుంది."},rahu:{te:"దుర్గాదేవిని ఆరాధించండి, శనివారం దానం చేయండి, నిజాయితీగా ఉండండి. అనవసర గందరగోళం తగ్గుతుంది."},ketu:{te:"గణపతిని ఆరాధించండి, ధ్యానం అలవరచుకోండి, సాధువులకు సేవ చేయండి. మనసు స్థిరపడుతుంది."}};
U.marriage={boyDefault:{en:"Boy",hi:"वर",te:"వరుడు"},girlDefault:{en:"Girl",hi:"वधू",te:"వధువు"},outlookText:{en:"This is a favourable match according to classical compatibility principles. The emotional foundation is strong, and the identified challenges are manageable through communication, mutual respect, and the suggested remedies.",hi:"शास्त्रीय अनुकूलता सिद्धांतों के अनुसार यह एक शुभ संबंध है। भावनात्मक नींव सुदृढ़ है, और उल्लिखित चुनौतियाँ संवाद, परस्पर सम्मान तथा सुझाए गए उपायों से सहज प्रबंधनीय हैं।",te:"శాస్త్రీయ అనుకూలత సూత్రాల ప్రకారం ఇది ఒక శుభమైన బంధం. మనసుల పునాది బలంగా ఉంది, గుర్తించిన ఇబ్బందులు మాటలతో, పరస్పర గౌరవంతో, సూచించిన పరిహారాలతో సులభంగా సర్దుకుంటాయి."},confirmBoth:{en:"If both match known details, generate. (Do double-check AM/PM!)",hi:"दोनों विवरण सही हों तो रिपोर्ट बनाएँ। (AM/PM ज़रूर जाँचें!)",te:"రెండు వివరాలు సరిగ్గా ఉంటే రిపోర్ట్ తయారు చేయండి. (AM/PM తప్పకుండా చూడండి!)"},effectiveGuna:{en:"EFFECTIVE GUNA SCORE",hi:"असली गुण अंक",te:"అసలు గుణ స్కోర్"},noMajor:{en:"No major challenges ✓",hi:"कोई बड़ी चुनौती नहीं ✓",te:"పెద్ద ఇబ్బందులు లేవు ✓"},execSummary:{en:"Executive Summary",hi:"सारांश",te:"సారాంశం"},overallMatch:{en:"OVERALL MATCH",hi:"कुल मिलान",te:"మొత్తం మ్యాచ్"},bestQualities:{en:"BEST QUALITIES",hi:"सबसे अच्छी बातें",te:"అత్యుత్తమ లక్షణాలు"},challenges:{en:"CHALLENGES",hi:"ध्यान देने योग्य बातें",te:"గమనించాల్సినవి"},outlook:{en:"MARRIAGE OUTLOOK & RECOMMENDATION",hi:"विवाह का निष्कर्ष एवं सलाह",te:"వివాహ ఫలితం మరియు సలహా"},koota:{en:"Koota",hi:"कूट",te:"కూటం"},meaning:{en:"Meaning",hi:"अर्थ",te:"అర్థం"},points:{en:"Points",hi:"अंक",te:"పాయింట్లు"},dosha:{en:"Dosha",hi:"दोष",te:"దోషం"},nadiBhakoot:{en:"Nadi and Bhakoot — no dosha ✓",hi:"नाड़ी और भकूट — कोई दोष नहीं ✓",te:"నాడి, భకూట — దోషం లేదు ✓"},mangalDosha:{en:"Mangal Dosha",hi:"मंगल दोष",te:"కుజ దోషం"},cancelFactors:{en:"Cancellation factors",hi:"दोष कटने के कारण",te:"దోషం తొలగే కారణాలు"},noneSignificant:{en:"None significant ✓",hi:"कोई बड़ा कारण नहीं ✓",te:"గణనీయమైనవి లే U.manglik={none:{te:"రెండు జాతకాల్లోనూ కుజ దోషం లేదు — ఈ సంబంధానికి కుజుడి వల్ల ఎలాంటి అడ్డంకీ లేదు."},neutralized:{te:"రెండు జాతకాల్లోనూ కుజ దోషం ఉంది — శాస్త్ర నియమం ప్రకారం దోషం పరస్పరం తొలగిపోతుంది."},softened:{te:"ఒక జాతకంలో కుజ దోషం ఉంది, కానీ కింద చెప్పిన శాస్త్ర పరిహార కారణాల వల్ల అది తగ్గింది; సంప్రదాయ పరిహారాలతో ఈ సంబంధం ముందుకు సాగవచ్చు."},present:{te:"ఒక జాతకంలో కుజ దోషం ఉంది, తొలగించే కారణాలేవీ లేవు — ముందుకు వెళ్లేముందు కుజ శాంతి (హనుమాన్ ఉపాసన, మంగళవార వ్రతం) చేసి పెద్దల సలహా తీసుకోవాలని సంప్రదాయం చెబుతోంది."},note:{en:"Note: Mangal Dosha strength reflects Mars’ house position and aggravating or softening factors — which is why we show it as Mild / Moderate / Strong rather than a raw number.",hi:"नोट: मंगल दोष की तीव्रता मंगल की भाव-स्थिति से आँकी जाती है; एकाधिक कारक इसे बढ़ा या घटा सकते हैं।",te:"గమనిక: కుజ దోష తీవ్రత కుజుడి భావ స్థితిని బట్టి, దాన్ని పెంచే లేదా తగ్గించే అంశాలను బట్టి లెక్కిస్తారు — అందుకే దీన్ని ఒక సంఖ్యగా కాకుండా అల్ప / మధ్యమ / తీవ్ర అని చూపిస్తున్నాం."},"Mild":{en:"Mild",hi:"अल्प",te:"అల్ప"},"Moderate":{en:"Moderate",hi:"मध्यम",te:"మధ్యమ"},"Strong":{en:"Strong",hi:"प्रबल",te:"తీవ్ర"}};

function sdPrint(){
  // Ensure webfonts are fully loaded before PDF export — an unloaded Devanagari
  // font makes the print engine substitute and break shaping.
  try{
    if(document.fonts && document.fonts.ready){
      document.fonts.ready.then(function(){ setTimeout(function(){ window.print(); }, 60); });
      return;
    }
  }catch(e){}
  window.print();
}

var LANG='en', CTX=null;
function setLang(l){LANG=l;['en','hi','te'].forEach(function(x){var b=document.getElementById('l'+x.charAt(0).toUpperCase()+x.slice(1));if(b)b.className=(l===x?'on':'');});}
function T(o){return o?(o[LANG]||o.en||o.hi):'';}

var UI=null;
var UI_FB={'career.confirmGen':'If correct, generate (check AM/PM)','career.primarySig':'PRIMARY CAREER SIGNATURE',
 'career.topFields':'TOP FIELDS','career.keyIndicators':'KEY INDICATORS','career.leadership':'Leadership',
 'career.entrepreneurship':'Entrepreneurship','career.wealth':'Wealth','career.recommendation':'RECOMMENDATION',
 'career.whatToDo':'What to do in each period — direct guidance on putting astrology to use:',
 'common.house':'house','common.nature':'nature'};
function U(path){
  if(!UI)UI=window.SD_UI||{};
  var parts=path.split('.'),o=UI;
  for(var i=0;i<parts.length;i++){o=o?o[parts[i]]:null;}
  if(o&&(o[LANG]||o.en||o.hi))return o[LANG]||o.en||o.hi;
  return UI_FB[path]||'';
}
function TT(obj){if(!obj)return '';return obj['t_'+LANG]||obj.t_en||obj.t_hi||'';}
function term(kind,val){if(!UI)UI=window.SD_UI||{};var m=UI[kind]&&UI[kind][val];return m?(m[LANG]||m.en||val):val;}
function locReason(r){
  if(!r)return '';
  if(LANG==='en'||LANG==='hi')return T(r);
  var e=r.en||'';
  function role(t){
    if(/10th house/.test(t)&&/lord/.test(t))return U('reason.tenthLord');
    if(/natural karaka/.test(t))return U('reason.karaka');
    if(/D10/.test(t))return U('reason.d10lord');
    return t;
  }
  var m1=e.match(/^Antar lord (\w+) — (.+)$/); if(m1)return U('reason.antarLord')+' '+gname2(m1[1])+' — '+role(m1[2]);
  var m2=e.match(/^Maha lord (\w+) — (.+)$/);  if(m2)return U('reason.mahaLord')+' '+gname2(m2[1])+' — '+role(m2[2]);
  var m3=e.match(/^Jupiter transits house (\d+) from your Moon$/);
  if(m3)return U('reason.jupTransit')+' '+m3[1]+' '+U('reason.fromMoon');
  if(/traditional age window/.test(e))return U('reason.ageWindow');
  return T(r);
}

  var dv=document.getElementById('bdate').value.split('-').map(Number);
  var tv=document.getElementById('btime').value.split(':').map(Number);

}

}

      +U('career.entrepreneurship')+': <b>'+cw.entrepreneurship+'/100</b><br>'
      +U('career.wealth')+': <b>'+cw.wealthScore+'/100</b></div></div></div>'
    +'<div class="idcard"><div class="t">'+U('career.recommendation')+'</div><div class="prose" style="margin:6px 0 0;">'+T(W.planetCareer[topPlanet]).split('.').slice(0,2).join('.')+'.</div></div>');
  // DASHBOARD
  function bar(label,v){var col=v>=74?'#2B8B5A':(v>=58?'#E8730C':'#B8434A');
    return '<div style="margin-bottom:12px;"><div style="display:flex;justify-content:space-between;font-size:15px;"><span><b>'+label+'</b></span><b style="color:'+col+';">'+v+'/100</b></div>'
    +'<div style="background:#EFE9DC;border-radius:7px;height:12px;overflow:hidden;margin-top:4px;"><div style="width:'+v+'%;height:100%;background:'+col+';"></div></div></div>';}
  pg('<h2 class="sec">📊 '+T(L.dash)+'</h2>'
    +bar(U('career.barLeadership'),cw.leadership)
    +bar(U('career.barEntre'),cw.entrepreneurship)
    +bar(U('career.barWealth'),cw.wealthScore)
    +bar(U('career.barGovt'),Math.min(92,50+cw.govtScore*10))
    +bar(U('career.barPriv'),Math.min(92,50+cw.privScore*10))
    +'<div class="prose" style="font-size:11.5px;color:#8B5A2B;">'+T(L.method)+'</div>');
  // LEADERSHIP PROFILE
  var W2=W.moreLabels;
  var leadTxt=cw.leadership>=72?U('career.leadStrong'):cw.leadership>=56?U('career.leadMid'):U('career.leadExpert');
  pg('<h2 class="sec">🧭 '+T(W2.leadership)+' — '+cw.leadership+'/100</h2>'
    +'<div style="background:#EFE9DC;border-radius:7px;height:14px;overflow:hidden;margin:0 0 12px;"><div style="width:'+cw.leadership+'%;height:100%;background:'+(cw.leadership>=72?'#2B8B5A':cw.leadership>=56?'#E8730C':'#B8434A')+';"></div></div>'
    +'<div class="prose">'+leadTxt+'</div>');
  // FIELDS
  var fieldsH=cw.fieldKeys.map(function(fk,i){var p=fk.split('|');
    return '<div class="fieldrow"><div class="rank">'+(i+1)+'</div><div>'+fieldName(fk)+' <span style="font-size:11px;color:#8B5A2B;">('+gname2(p[0])+')</span></div></div>';}).join('');
  pg('<h2 class="sec">🎯 '+T(L.fields)+'</h2><div class="prose" style="font-size:13px;color:#8B5A2B;">'+T(L.fieldsIntro)+'</div>'+fieldsH
    +'<div class="yog" style="margin-top:14px;">'+T(W.planetCareer[topPlanet])+'</div>');
  // GOVT vs PRIVATE + JOB vs BUSINESS
  pg('<h2 class="sec">🏛️ '+T(L.govt)+'</h2><div class="prose">'+T(W.govt[cw.govtLean])+'</div>'
    +'<h2 class="sec">💼 '+T(L.jobbiz)+'</h2>'
    +'<div class="idcard"><div class="t">'+T(L.entre)+'</div><div class="v">'+cw.entrepreneurship+' / 100</div>'
    +'<div style="background:#EFE9DC;border-radius:7px;height:12px;overflow:hidden;margin-top:6px;"><div style="width:'+cw.entrepreneurship+'%;height:100%;background:'+(cw.entrepreneurship>=68?'#2B8B5A':cw.entrepreneurship>=52?'#E8730C':'#B8434A')+';"></div></div></div>'
    +'<div class="prose">'+T(W.jobbiz[cw.jobBusiness])+'</div>');
  // WEALTH + SUB-DIMENSIONS + WINDOWS
  var wtier=cw.wealthScore>=74?'high':cw.wealthScore>=58?'moderate':'building';
  function starRow(label,n){var f='<span style="color:#E8730C;">'+'\u2605'.repeat(n)+'</span><span style="color:#D4A843;">'+'\u2606'.repeat(5-n)+'</span>';
    return '<div style="display:flex;justify-content:space-between;font-size:15px;padding:6px 0;border-bottom:1px dashed #E4D3AE;"><span>'+label+'</span><span style="font-size:17px;letter-spacing:2px;">'+f+'</span></div>';}
  var to=new Date(Date.now()+12*365.25*86400000);
  var win=PE.getEventWindows('career',b,lat,lng,new Date(),to);
  var winH=win.windows.slice(0,4).map(function(x){
    var act=W.action[x.antar]||W.action[x.maha];
    var doList=act?(act['do'+LANG.charAt(0).toUpperCase()+LANG.slice(1)]||act.doEn||[]):[];
    var avList=act?(act['avoid'+LANG.charAt(0).toUpperCase()+LANG.slice(1)]||act.avoidEn||[]):[];
    return '<div class="yog ok"><b>'+gname2(x.maha)+' – '+gname2(x.antar)+'</b> · '+fD(x.start)+' → '+fD(x.end)
      +(doList.length?'<br><span style="color:#2B7A4B;">'+T(W.moreLabels.doLabel)+':</span> '+doList.map(function(d){return '\u2705 '+d;}).join(' &nbsp; '):'')
      +(avList.length?'<br><span style="color:#B8434A;">'+T(W.moreLabels.avoidLabel)+':</span> '+avList.map(function(d){return '\u274C '+d;}).join(' &nbsp; '):'')
      +'</div>';}).join('');
  pg('<h2 class="sec">💰 '+T(L.wealthH)+' — '+cw.wealthScore+'/100</h2><div class="prose">'+T(W.wealth[wtier])+'</div>'
    +'<div class="idcard"><div class="t">'+T(W.moreLabels.wealthDim)+'</div>'
    +starRow(T(W.moreLabels.income),cw.wealthStars.income)
    +starRow(T(W.moreLabels.retention),cw.wealthStars.retention)
    +starRow(T(W.moreLabels.risk),cw.wealthStars.risk)+'</div>');
  pg('<h2 class="sec">📈 '+T(L.peaks)+'</h2><div class="prose" style="font-size:13px;color:#8B5A2B;">'+U('career.whatToDo')+'</div>'+winH);
  if(cw.avoidKeys.length){
    var avoidH=cw.avoidKeys.map(function(ak){var p=ak.split('|');
      return '<div class="fieldrow" style="color:#8B434A;"><div style="font-size:18px;">\u274C</div><div>'+fieldName(ak)+' <span style="font-size:11px;color:#8B5A2B;">('+gname2(p[0])+')</span></div></div>';}).join('');
    pg('<h2 class="sec">⚠️ '+T(W.moreLabels.avoid)+'</h2><div class="prose">'+T(W.avoidIntro)+'</div>'+avoidH
      +'<div class="prose" style="font-size:12px;color:#8B5A2B;margin-top:10px;">'+U('career.avoidFields')+'</div>');
  }
  // FOREIGN + REMEDIES + FOOTER
  var rem=[cw.tenthLord,'sun','saturn','mercury'].filter(function(v,i,a){return a.indexOf(v)===i;}).slice(0,4).map(function(k){var r=C.remedy[k];return r?'<div class="yog"><b>'+(U('mantraLabel.'+k)||r.name)+'</b> — <span style="color:#8B2B33;">'+r.mantra+'</span><br>'+((window.SD_UI&&SD_UI.remedy&&SD_UI.remedy[k]&&SD_UI.remedy[k][LANG])||(LANG==='hi'?r.hi:r.en))+'</div>':'';}).join('');
  pg('<h2 class="sec">🌏 '+T(L.foreign)+'</h2><div class="prose">'+T(cw.foreign.length?W.foreignYes:W.foreignNo)+'</div>'
    +'<h2 class="sec">🙏 '+T(L.remedies)+'</h2>'+rem
    +'<div class="foot">'+T(L.disclaimer)+'<br><b>शुभ दिन · shubhdin.app</b> · '+new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'2-digit',year:'numeric'})+'</div>');
  document.getElementById('report').innerHTML=H;
  var rep=document.getElementById('report');
  rep.className='lang-'+LANG;
  rep.setAttribute('lang',LANG);
  rep.style.display='block';
  document.getElementById('printbar').style.display='block';
  document.getElementById('inputScreen').style.display='none';
  window.scrollTo(0,0);
} catch(err){ alert('Report generation error: '+err.message+'\n\nLikely an outdated cached file — hard-refresh (Ctrl+Shift+R) and retry.'); console.error(err); } }
