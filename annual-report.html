<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shubh Din — Annual Forecast</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Telugu:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#5C1A1B;--gold:#B8860B;--gold2:#D4A843;--paper:#FFFDF6;--soft:#8B5A2B;--saffron:#E8730C;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important;}
body{background:#EFE9DC;font-family:'Noto Serif Devanagari',serif;color:var(--ink);}
.screen{max-width:720px;margin:24px auto;background:var(--paper);border:1px solid var(--gold2);border-radius:12px;padding:28px;}
h1.brand{font-size:23px;text-align:center;}
.sub{text-align:center;color:var(--soft);font-size:13px;margin:4px 0 16px;}
label{display:block;font-size:12px;color:var(--soft);margin:8px 0 3px;}
input,select,button{font-family:inherit;font-size:14px;padding:8px 9px;border:1px solid var(--gold2);border-radius:8px;background:#fff;color:var(--ink);width:100%;}
button{background:linear-gradient(135deg,#8B2B33,#5C1A1B);color:#FFE8C8;border:none;cursor:pointer;margin-top:14px;font-size:15px;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.note{font-size:12px;color:var(--soft);border-top:1px dashed var(--gold2);margin:14px 0 4px;padding-top:10px;}
.confirm{background:#FFF6E3;border:1px dashed var(--gold);border-radius:10px;padding:12px;margin-top:14px;display:none;font-size:14px;line-height:1.8;}
.langToggle{display:flex;gap:8px;margin-top:8px;}
.langToggle button{margin:0;background:#fff;color:var(--ink);border:1px solid var(--gold2);}
.langToggle button.on{background:var(--ink);color:#FFE8C8;}
#report{display:none;}
.page{max-width:794px;margin:16px auto;background:var(--paper);padding:46px 50px;box-shadow:0 2px 14px rgba(92,26,27,.12);position:relative;min-height:1000px;}
.page::before{content:"";position:absolute;inset:14px;border:1.5px solid var(--gold2);border-radius:4px;pointer-events:none;}
.cover{display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;}
h2.sec{font-size:21px;color:var(--saffron);border-bottom:2px solid var(--gold2);padding-bottom:6px;margin:6px 0 14px;}
table{width:100%;border-collapse:collapse;font-size:13.5px;margin:8px 0 16px;}
th,td{border:1px solid #E4D3AE;padding:7px 9px;text-align:left;}
th{background:#F8EFD8;font-weight:600;}
tr:nth-child(even) td{background:#FDF8EC;}
.prose{font-size:15px;line-height:1.85;text-align:justify;margin-bottom:12px;}
.idcard{background:#FFF6E3;border:1px solid var(--gold2);border-radius:10px;padding:12px 14px;margin-bottom:12px;}
.idcard .t{font-size:11.5px;color:var(--soft);}
.idcard .v{font-size:18px;color:#8B2B33;font-weight:700;margin-top:2px;}
.yog{background:#FDF8EC;border-left:4px solid var(--gold);padding:10px 13px;margin-bottom:10px;font-size:14.5px;line-height:1.75;}
.ok{background:#F2F8EF;border-left-color:#5A8B2B;}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.mcard{border:1px solid var(--gold2);border-radius:9px;padding:9px 11px;font-size:13px;background:#FDF8EC;}
.mcard .mh{display:flex;justify-content:space-between;align-items:center;font-weight:700;color:#8B2B33;margin-bottom:3px;}
.mdot{width:11px;height:11px;border-radius:50%;display:inline-block;}
.foot{font-size:12px;color:var(--soft);border-top:1px solid var(--gold2);padding-top:10px;margin-top:20px;line-height:1.7;}
.printbar{max-width:794px;margin:10px auto;text-align:center;}
.printbar button{width:auto;padding:10px 26px;}
@media print{body{background:#fff;}.screen,.printbar{display:none !important;}#report{display:block !important;}
.page{box-shadow:none;margin:0;page-break-after:always;min-height:auto;padding:34px 40px;}.page:last-child{page-break-after:auto;}
.mcard,.yog{page-break-inside:avoid;}}
@page{size:A4;margin:10mm;}

/* devanagari-print-safety: letter-spacing splits matras/conjuncts (दि ल). Never apply to Indic text. */
body,.page,.prose,.idcard,.yog,td,th,h1,h2,div,span{letter-spacing:normal;}
.stars,.scorepill{letter-spacing:2px;}
@media print{*{-webkit-font-feature-settings:"liga" 1,"kern" 1;font-feature-settings:"liga" 1,"kern" 1;}}

/* ── DEVANAGARI SHAPING SAFETY ──────────────────────────────────────────────
   A Latin-first font stack (e.g. 'Cormorant Garamond' first) forces the browser
   into PER-CHARACTER font fallback for Hindi. Shaping a syllable cluster across
   two font runs splits matras/conjuncts:  करियर → "करि यर",  बातचीत → "बा तची त".
   Fix: when the report renders in Hindi, use ONE complete Devanagari font for
   everything, and disable anything that can insert space inside a cluster. */
#report.lang-hi, #report.lang-hi *{
  font-family:'Noto Serif Devanagari','Nirmala UI','Mangal','Kokila',serif !important;
  letter-spacing:normal !important;
  word-spacing:normal !important;
  word-break:normal !important;
  overflow-wrap:normal !important;
  font-synthesis:none;               /* faux-bold can break conjunct shaping */
  text-rendering:optimizeLegibility;
}
#report.lang-hi .prose{text-align:left;}   /* justify stretches Indic awkwardly */
@media print{
  #report.lang-hi, #report.lang-hi *{
    font-family:'Noto Serif Devanagari','Nirmala UI','Mangal',serif !important;
    letter-spacing:normal !important;
  }
}

/* Telugu: same single-font shaping law as Devanagari (§10.2 / §T6) */
#report.lang-te, #report.lang-te *{
  font-family:'Noto Serif Telugu','Gautami','Nirmala UI',serif !important;
  letter-spacing:normal !important; word-spacing:normal !important;
  word-break:normal !important; overflow-wrap:normal !important;
  font-synthesis:none; text-rendering:optimizeLegibility;
}
#report.lang-te .prose{text-align:left;}
@media print{#report.lang-te, #report.lang-te *{
  font-family:'Noto Serif Telugu','Gautami','Nirmala UI',serif !important;letter-spacing:normal !important;}}
</style>
</head>
<body>
<div class="screen" id="inputScreen">
  <h1 class="brand">📅 शुभ दिन — Annual Forecast</h1>
  <div class="sub">Varshaphal solar-return · Year lord · Muntha · Month-by-month · Renew every year</div>
  <div class="row">
    <div><label>Name / नाम</label><input id="pname" value=""></div>
    <div><label>Forecast year / वर्ष</label><input id="foryear" type="number" value="2026"></div>
  </div>
  <div class="row">
    <div><label>Birth Date</label><input id="bdate" type="date" value="1996-12-06"></div>
    <div><label>Birth Time (24h)</label><input id="btime" type="time" value="15:47"></div>
  </div>
  <div class="row">
    <div><label>Birth Latitude</label><input id="blat" type="number" step="0.0001" value="16.4343"></div>
    <div><label>Birth Longitude</label><input id="blng" type="number" step="0.0001" value="81.6985"></div>
  </div>
  <div class="note">आप अभी कहाँ रहते हैं? (वर्षफल हेतु) / Where do you live now? (for Varshaphal)</div>
  <div class="row">
    <div><label>Current Latitude</label><input id="clat" type="number" step="0.0001" value="16.7"></div>
    <div><label>Current Longitude</label><input id="clng" type="number" step="0.0001" value="81.1"></div>
  </div>
  <div class="langToggle"><button id="lEn" class="on" onclick="setLang('en')">English</button><button id="lHi" onclick="setLang('hi')">हिन्दी</button><button id="lTe" onclick="setLang('te')">తెలుగు</button></div>
  <button onclick="confirmStep()">Generate My Year → बनाएँ</button>
  <div class="confirm" id="confirmBox">
    <div id="confirmText"></div>
    <div class="row">
      <button style="background:#5A8B2B;" onclick="generate()">✓ Correct — Generate</button>
      <button style="background:#B8434A;" onclick="document.getElementById('confirmBox').style.display='none'">✗ Fix details</button>
    </div>
  </div>
</div>
<div class="printbar" id="printbar" style="display:none;"><button onclick="sdPrint()">🖨️ Print / Save as PDF</button></div>
<div id="report"></div>

<script src="astronomy.min.js"></script>

 గులాబీ పూలు సమర్పించడం, అందాన్ని ఆదరించడం దీన్ని బలపరుస్తుంది."},venusNeutral:{en:"Your Venus holds a balanced placement, giving love a steady foundation.",hi:"आपका शुक्र संतुलित स्थिति में है, जो प्यार को मज़बूत नींव देता है।",te:"మీ జాతకంలో శుక్రుడు సమతుల్య స్థితిలో ఉన్నాడు, ఇది ప్రేమకు స్థిరమైన పునాది ఇస్తుంది."},venusRemedyIntro:{en:"Venus is the planet of love, beauty and sweetness. Honouring it brings tenderness to your relationships:",hi:"शुक्र प्यार, सुंदरता और मिठास का ग्रह है। इसे प्रसन्न रखना रिश्तों में मिठास लाता है:",te:"శుక్రుడు ప్రేమ, అందం, మాధుర్యానికి అధిపతి. ఆయనను ఆరాధించడం బంధాల్లో మాధుర్యాన్ని తెస్తుంది:"},closingQuote:{en:"\"The stars incline; they do not compel. Your open heart writes the truest love story of all.\"",hi:"\"सितारे राह दिखाते हैं, मजबूर नहीं करते। सबसे सच्ची प्रेम कहानी आपका खुला दिल ही लिखता है।\"",te:"\"గ్రహాలు దారి చూపిస్తాయి, బలవంతం చేయవు. అత్యంత నిజమైన ప్రేమ కథను రాసేది మీ తెరిచిన మనసే.\""}};

U.remedy={sun:{te:"ఆదివారం సూర్యుడికి నమస్కరించండి, ఉదయపు ఎండలో కొద్దిసేపు నిలబడండి. ఆత్మవిశ్వాసం, గౌరవం పెరుగుతాయి."},moon:{te:"సోమవారం శివుడిని ఆరాధించండి, తెల్లని వస్తువులు దానం చేయండి. మనసుకు ప్రశాంతత కలుగుతుంది."},mars:{te:"మంగళవారం హనుమంతుడిని ఆరాధించండి, ఓపికను అలవరచుకోండి. ధైర్యం సరైన దిశలో పని చేస్తుంది."},mercury:{te:"బుధవారం విష్ణువును స్మరించండి, పచ్చని వస్తువులు దానం చేయండి. మాటలో, వ్యవహారంలో స్పష్టత వస్తుంది."},jupiter:{te:"గురువారం గురువును ఆరాధించండి, పసుపు పచ్చని వస్తువులు దానం చేయండి, పెద్దలను గౌరవించండి. జ్ఞానం, అదృష్టం పెరుగుతాయి."},venus:{te:"శుక్రవారం లక్ష్మీదేవిని ఆరాధించండి, తెలుపు లేదా గులాబీ పూలు సమర్పించండి, అందాన్ని ఆదరించండి, ఉదారంగా ఇవ్వండి. ప్రేమలో, బంధాల్లో మాధుర్యం పెరుగుతుంది."},saturn:{te:"శనివారం శనిదేవుడిని ఆరాధించండి, నల్ల నువ్వులు దానం చేయండి, పేదలకు సాయం చేయండి. ఓపిక ఫలిస్తుంది."},rahu:{te:"దుర్గాదేవిని ఆరాధించండి, శనివారం దానం చేయండి, నిజాయితీగా ఉండండి. అనవసర గందరగోళం తగ్గుతుంది."},ketu:{te:"గణపతిని ఆరాధించండి, ధ్యానం అలవరచుకోండి, సాధువులకు సేవ చేయండి. మనసు స్థిరపడుతుంది."}};
U.marriage={outlookText:{en:"This is a favourable match according to classical compatibility principles. The emotional foundation is strong, and the identified challenges are manageable through communication, mutual respect, and the suggested remedies.",hi:"शास्त्रीय अनुकूलता सिद्धांतों के अनुसार यह एक शुभ संबंध है। भावनात्मक नींव सुदृढ़ है, और उल्लिखित चुनौतियाँ संवाद, परस्पर सम्मान तथा सुझाए गए उपायों से सहज प्रबंधनीय हैं।",te:"శాస్త్రీయ అనుకూలత సూత్రాల ప్రకారం ఇది ఒక శుభమైన బంధం. మనసుల పునాది బలంగా ఉంది, గుర్తించిన ఇబ్బందులు మాటలతో, పరస్పర గౌరవంతో, సూచించిన పరిహారాలతో సులభంగా సర్దుకుంటాయి."},confirmBoth:{en:"If both match known details, generate. (Do double-check AM/PM!)",hi:"दोनों विवरण सही हों तो रिपोर्ट बनाएँ। (AM/PM ज़रूर जाँचें!)",te:"రెండు వివరాలు సరిగ్గా ఉంటే రిపోర్ట్ తయారు చేయండి. (AM/PM తప్పకుండా చూడండి!)"},effectiveGuna:{en:"EFFECTIVE GUNA SCORE",hi:"असली गुण अंक",te:"అసలు గుణ స్కోర్"},noMajor:{en:"No major challenges ✓",hi:"कोई बड़ी चुनौती नहीं ✓",te:"పెద్ద ఇబ్బందులు లేవు ✓"},execSummary:{en:"Executive Summary",hi:"सारांश",te:"సారాంశం"},overallMatch:{en:"OVERALL MATCH",hi:"कुल मिलान",te:"మొత్తం మ్యాచ్"},bestQualities:{en:"BEST QUALITIES",hi:"सबसे अच्छी बातें",te:"అత్యుత్తమ లక్షణాలు"},challenges:{en:"CHALLENGES",hi:"ध्यान देने योग्य बातें",te:"గమనించాల్సినవి"},outlook:{en:"MARRIAGE OUTLOOK & RECOMMENDATION",hi:"विवाह का निष्कर्ष एवं सलाह",te:"వివాహ ఫలితం మరియు సలహా"},koota:{en:"Koota",hi:"कूट",te:"కూటం"},meaning:{en:"Meaning",hi:"अर्थ",te:"అర్థం"},points:{en:"Points",hi:"अंक",te:"పాయింట్లు"},dosha:{en:"Dosha",hi:"दोष",te:"దోషం"},nadiBhakoot:{en:"Nadi and Bhakoot — no dosha ✓",hi:"नाड़ी और भकूट — कोई दोष नहीं ✓",te:"నాడి, భకూట — దోషం లేదు ✓"},mangalDosha:{en:"Mangal Dosha",hi:"मंगल दोष",te:"కుజ దోషం"},cancelFactors:{en:"Cancellation factors",hi:"दोष कटने के कारण",te:"దోషం తొలగే కారణాలు"},noneSignificant:{en:"None significant ✓",hi:"कोई बड़ा कारण नहीं ✓",te:"గణనీయమైనవి లేవు ✓"},yes:{en:"Yes",hi:"हाँ",te:"అవును"},no:{en:"No",hi:"नहीं",te:"లేదు"}};
U.manglik={none:{te:"రెండు జాతకాల్లోనూ కుజ దోషం లేదు — ఈ సంబంధానికి కుజుడి వల్ల ఎలాంటి అడ్డంకీ లేదు."},neutralized:{te:"రెండు జాతకాల్లోనూ కుజ దోషం ఉంది — శాస్త్ర నియమం ప్రకారం దోషం పరస్పరం తొలగిపోతుంది."},softened:{te:"ఒక జాతకంలో కుజ దోషం ఉంది, కానీ కింద చెప్పిన శాస్త్ర పరిహార కారణాల వల్ల అది తగ్గింది; సంప్రదాయ పరిహారాలతో ఈ సంబంధం ముందుకు సాగవచ్చు."},present:{te:"ఒక జాతకంలో కుజ దోషం ఉంది, తొలగించే కారణాలేవీ లేవు — ముందుకు వెళ్లేముందు కుజ శాంతి (హనుమాన్ ఉపాసన, మంగళవార వ్రతం) చేసి పెద్దల సలహా తీసుకోవాలని సంప్రదాయం చెబుతోంది."},note:{en:"Note: Mangal Dosha strength reflects Mars’ house position and aggravating or softening factors — which is why we show it as Mild / Moderate / Strong rather than a raw number.",hi:"नोट: मंगल दोष की तीव्रता मंगल की भाव-स्थिति से आँकी जाती है; एकाधिक कारक इसे बढ़ा या घटा सकते हैं।",te:"గమనిక: కుజ దోష తీవ్రత కుజుడి భావ స్థితిని బట్టి, దాన్ని పెంచే లేదా తగ్గించే అంశాలను బట్టి లెక్కిస్తారు — అందుకే దీన్ని ఒక సంఖ్యగా కాకుండా అల్ప / మధ్యమ / తీవ్ర అని చూపిస్తున్నాం."},"Mild":{en:"Mild",hi:"अल्प",te:"అల్ప"},"Moderate":{en:"Moderate",hi:"मध्यम",te:"మధ్యమ"},"Strong":{en:"Strong",hi:"प्रबल",te:"తీవ్ర"}};
U.career={barLeadership:{en:"Leadership Ability",hi:"नेतृत्व क्षमता",te:"నాయకత్వ శక్తి"},barEntre:{en:"Entrepreneurship",hi:"अपना काम शुरू करने की क्षमता",te:"సొంత వ్యాపార శక్తి"},barWealth:{en:"Wealth Potential",hi:"धन संभावना",te:"సంపద అవకాశం"},barGovt:{en:"Govt Sector Fit",hi:"सरकारी नौकरी में सफलता",te:"ప్రభుత్వ ఉద్యోగంలో విజయం"},barPriv:{en:"Private Sector Fit",hi:"प्राइवेट सेक्टर में सफलता",te:"ప్రైవేట్ సెక్టార్‌లో విజయం"},confirmGen:{en:"If correct, generate (check AM/PM)",hi:"सही हो तो रिपोर्ट बनाएँ (AM/PM जाँचें)",te:"సరిగ్గా ఉంటే రిపోర్ట్ తయారు చేయండి (AM/PM చూడండి)"},primarySig:{en:"PRIMARY CAREER SIGNATURE",hi:"आपकी करियर पहचान",te:"మీ కెరీర్ స్వభావం"},topFields:{en:"TOP FIELDS",hi:"सबसे अच्छे क्षेत्र",te:"ఉత్తమ రంగాలు"},keyIndicators:{en:"KEY INDICATORS",hi:"मुख्य संकेत",te:"ముఖ్య సూచికలు"},leadership:{en:"Leadership",hi:"नेतृत्व",te:"నాయకత్వం"},entrepreneurship:{en:"Entrepreneurship",hi:"अपना काम",te:"సొంత వ్యాపారం"},wealth:{en:"Wealth",hi:"धन",te:"సంపద"},recommendation:{en:"RECOMMENDATION",hi:"सलाह",te:"సలహా"},leadStrong:{en:"Your leadership potential is strong — people accept your guidance naturally. Management, team-lead or founder roles suit you well.",hi:"आपमें स्वाभाविक नेतृत्व-क्षमता प्रबल है — लोग आपका मार्गदर्शन सहज स्वीकार करते हैं। प्रबंधन, टीम-नेतृत्व या संस्थापक भूमिकाएँ आपके अनुकूल हैं।",te:"మీలో సహజమైన నాయకత్వ శక్తి బలంగా ఉంది — మీ మార్గదర్శనాన్ని జనం సులభంగా అంగీకరిస్తారు. మేనేజ్‌మెంట్, టీమ్ లీడ్ లేదా వ్యవస్థాపక పాత్రలు మీకు బాగా సరిపోతాయి."},leadMid:{en:"You have solid leadership ability that grows with experience. Starting with a small team and building toward larger responsibility suits you.",hi:"आपमें अच्छी नेतृत्व-क्षमता है जो अनुभव के साथ निखरती है। छोटी टीम से आरंभ कर बड़ी ज़िम्मेदारी की ओर बढ़ना उपयुक्त रहेगा।",te:"మీలో మంచి నాయకత్వ శక్తి ఉంది, అది అనుభవంతో మెరుగవుతుంది. చిన్న టీమ్‌తో మొదలుపెట్టి పెద్ద బాధ్యతల వైపు వెళ్లడం మీకు సరిపోతుంది."},leadExpert:{en:"Your strength lies more in expertise than command — leading through deep skill is your natural path. Leadership can be learned, but you shine most as a specialist.",hi:"आपकी शक्ति नेतृत्व से अधिक विशेषज्ञता में है — गहरी दक्षता से प्रभाव बनाना आपका स्वाभाविक मार्ग है। नेतृत्व सीखा जा सकता है, पर विशेषज्ञ के रूप में आप अधिक चमकते हैं।",te:"మీ బలం ఆజ్ఞాపించడంలో కాదు, నైపుణ్యంలో ఉంది — లోతైన నైపుణ్యంతో ప్రభావం చూపడమే మీ సహజ మార్గం. నాయకత్వం నేర్చుకోవచ్చు, కానీ నిపుణుడిగానే మీరు ఎక్కువ మెరుస్తారు."},whatToDo:{en:"What to do in each period — direct guidance on putting astrology to use:",hi:"हर अवधि में क्या करें — ज्योतिष को काम में लाने की सीधी सलाह:",te:"ప్రతి కాలంలో ఏమి చేయాలి — జ్యోతిష్యాన్ని ఆచరణలో పెట్టే స్పష్టమైన సూచనలు:"},avoidFields:{en:"These fields rest mainly on the same less-supported planet(s) in your chart, which is why they group together.",hi:"ये क्षेत्र मुख्यतः उन्हीं ग्रहों पर आधारित हैं जो आपकी कुंडली में कम बली हैं — इसलिए एक साथ समूहित हैं।",te:"ఈ రంగాలు మీ జాతకంలో తక్కువ బలం ఉన్న గ్రహాల మీదే ఆధారపడతాయి — అందుకే ఇవి ఒకే గుంపుగా ఉన్నాయి."}};

U.forecast={subtitle:{en:"Your Next 10 Years — dasha, transits and what to do",hi:"आपके अगले 10 वर्ष — दशा, गोचर और क्या करें",te:"మీ రాబోయే 10 సంవత్సరాలు — దశ, గోచారం, ఏమి చేయాలి"},titleCover:{en:"Your Life Roadmap",hi:"जीवन रोडमैप",te:"మీ జీవిత రోడ్‌మ్యాప్"},moonSign:{en:"Moon sign",hi:"चंद्र राशि",te:"చంద్ర రాశి"},confirmYears:{en:"If correct, generate 10 years from ",hi:"सही हो तो यहाँ से 10 वर्ष बनाएँ ",te:"సరిగ్గా ఉంటే ఇక్కడి నుంచి 10 సంవత్సరాలు తయారు చేయండి "},stratBest:{en:"Ride this year’s momentum fully — make big decisions, investments and initiatives now. The window of opportunity is open.",hi:"इस वर्ष की गति का पूरा लाभ लें — बड़े निर्णय, निवेश और पहल अभी करें। अवसर की खिड़की खुली है।",te:"ఈ సంవత్సరపు వేగాన్ని పూర్తిగా వాడుకోండి — పెద్ద నిర్ణయాలు, పెట్టుబడులు, కొత్త ప్రయత్నాలు ఇప్పుడే చేయండి. అవకాశాల ద్వారం తెరిచి ఉంది."},stratCaution:{en:"Protect your gains, increase savings, prioritize health, and avoid big risks. This is a year to cross with patience.",hi:"लाभ सुरक्षित रखें, बचत बढ़ाएँ, स्वास्थ्य को प्राथमिकता दें और बड़े जोखिम टालें। यह वर्ष धैर्य से पार करने का है।",te:"మీ లాభాలను కాపాడుకోండి, పొదుపు పెంచండి, ఆరోగ్యానికి ప్రాధాన్యం ఇవ్వండి, పెద్ద రిస్క్‌లు వద్దు. ఈ సంవత్సరాన్ని ఓపికతో దాటాల్సి ఉంది."},age:{en:"Age",hi:"आयु",te:"వయసు"},ageLower:{en:"age",hi:"आयु",te:"వయసు"},alsoJoin:{en:"; also ",hi:"; साथ ही ",te:"; అలాగే "},yearByYear:{en:"Year by Year",hi:"वर्ष-दर-वर्ष",te:"సంవత్సరం వారీగా"},yearByYearContd:{en:"Year by Year (contd.)",hi:"वर्ष-दर-वर्ष (क्रमशः)",te:"సంవత్సరం వారీగా (కొనసాగింపు)"},closing:{en:"Closing",hi:"समापन",te:"ముగింపు"},closingText:{en:"This decade blends auspicious and testing years — as every life does. Move boldly in the bright years, lean on patience and remedies in the testing ones. Astrology shows the road; the walking is yours.",hi:"यह दशक शुभ और परीक्षा दोनों वर्षों का मिश्रण है — जैसा हर जीवन होता है। शुभ वर्षों में साहस से आगे बढ़ें, परीक्षा के वर्षों में धैर्य और उपायों का सहारा लें। ज्योतिष मार्ग दिखाता है; चलना <script src="report-content.js"></script>

<script>

function sdPrint(){
  // Ensure webfonts are fully loaded before PDF export — an unloaded Devanagari
  // font makes the print engine substitute and break shaping.
  try{
    if(document.fonts && document.fonts.ready){
      document.fonts.ready.then(function(){ setTimeout(function(){ window.print(); }, 60); });
      return;
    }
  }catch(e){}
  window.print();
}

var LANG='en', CTX=null;
function setLang(l){LANG=l;['en','hi','te'].forEach(function(x){var b=document.getElementById('l'+x.charAt(0).toUpperCase()+x.slice(1));if(b)b.className=(l===x?'on':'');});}
function T(o){return o?(o[LANG]||o.en||o.hi):'';}

var UI=null;
var UI_FB={'annual.turningAge':'Turning age','annual.planet':'Planet','annual.sign':'Sign','annual.houseCol':'House',
 'annual.nakshatraCol':'Nakshatra','annual.hShort':'H','annual.confirmPre':'If correct, generate ',
 'annual.confirmVarsha':'Varshaphal (check AM/PM)',
 'annual.auspiciousIntro':'Generally auspicious days this year (with your personal star-strength):',
 'annual.remedyIntroPre':'Strengthening this year\u2019s lord, ','annual.remedyIntroPost':', supports auspicious results all year:',
 'common.lagna':'Lagna','common.moonSign':'Moon','common.house':'house'};
function U(path){
  if(!UI)UI=window.SD_UI||{};
  var parts=path.split('.'),o=UI;
  for(var i=0;i<parts.length;i++){o=o?o[parts[i]]:null;}
  if(o&&(o[LANG]||o.en||o.hi))return o[LANG]||o.en||o.hi;
  return UI_FB[path]||'';
}
function TT(obj){if(!obj)return '';return obj['t_'+LANG]||obj.t_en||obj.t_hi||'';}
function term(kind,val){if(!UI)UI=window.SD_UI||{};var m=UI[kind]&&UI[kind][val];return m?(m[LANG]||m.en||val):val;}

function hintText(hint,field){
  if(!hint)return '';
  var suf=LANG.charAt(0).toUpperCase()+LANG.slice(1);
  return hint[field+suf]||hint[field+'En']||'';
}
function monthName(i){
  var ov=window.SD_UI&&SD_UI.annual&&SD_UI.annual.months&&SD_UI.annual.months[LANG];
  if(ov&&ov[i])return ov[i];
  return (LANG==='hi'?MONTHS_HI[i]:MONTHS_EN[i])||'';
}

var GR_HI={sun:'सूर्य',moon:'चंद्र',mars:'मंगल',mercury:'बुध',jupiter:'गुरु',venus:'शुक्र',saturn:'शनि',rahu:'राहु',ketu:'केतु'};
function gname2(k){if(!k)return '';var t=term('planet',k);return t!==k?t:(k.charAt(0).toUpperCase()+k.slice(1));}
function ist(d){return new Date(d.getTime()+5.5*3600000);}
function fD(d){return ist(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric',timeZone:'UTC'});}
function fDT(d){return ist(d).toLocaleString('en-IN',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit',timeZone:'UTC'});}
var MONTHS_EN=['January','February','March','April','May','June','July','August','September','October','November','December'];
var MONTHS_HI=['जनवरी','फरवरी','मार्च','अप्रैल','मई','जून','जुलाई','अगस्त','सितंबर','अक्टूबर','नवंबर','दिसंबर'];
function birthUTC(){
  var dv=document.getElementById('bdate').value.split('-').map(Number);
  var tv=document.getElementById('btime').value.split(':').map(Number);
  return new Date(Date.UTC(dv[0],dv[1]-1,dv[2],tv[0],tv[1],0)-5.5*3600000);
}
function confirmStep(){
  var PE=window.PanchangEngine;
  var b=birthUTC(),lat=+document.getElementById('blat').value,lng=+document.getElementById('blng').value;
  var bc=PE.getBirthChart(b,lat,lng); var moon=bc.grahas.find(function(x){return x.key==='moon';});
  CTX={b:b,lat:lat,lng:lng,clat:+document.getElementById('clat').value,clng:+document.getElementById('clng').value,
       name:document.getElementById('pname').value||'—',forYear:parseInt(document.getElementById('foryear').value)||new Date().getFullYear()};
  document.getElementById('confirmText').innerHTML='<b>'+U('common.lagna')+':</b> '+term('rashi',bc.lagna.en)+' · <b>'+U('common.moonSign')+':</b> '+term('rashi',moon.rashi.en)+' · <b>'+SD_ANNUAL.labels.forYear[LANG]+':</b> '+CTX.forYear
    +'<br>'+U('annual.confirmPre')+CTX.forYear+' '+U('annual.confirmVarsha');
  document.getElementById('confirmBox').style.display='block';
}
function generate(){ try {
  var PE=window.PanchangEngine, N=window.SD_ANNUAL, C=window.SD_CONTENT;
  if(!PE||!PE.getVarshaphal){alert('Engine not fully loaded. Please hard-refresh (Ctrl+Shift+R).');return;}
  if(!N||!C){alert('Content files missing. Ensure annual-content.js and report-content.js are in the same folder.');return;}
  if(!CTX){alert('Please click "Generate My Year" first.');return;}
  if(LANG!=='en'){var _p=(window.SD_ANNUAL&&SD_ANNUAL.labels&&SD_ANNUAL.labels.title)||null;
    if(!_p||!_p[LANG]){alert('The file annual-content.js on the server does not contain '+(LANG==='te'?'Telugu':LANG)+' text.\n\nUpload the latest annual-content.js and hard-refresh (Ctrl+Shift+R).');}}
  var b=CTX.b,L=N.labels,H='';
  function pg(inner){H+='<div class="page">'+inner+'</div>';}
  var vp=PE.getVarshaphal(b,CTX.lat,CTX.lng,CTX.forYear,CTX.clat,CTX.clng);
  var vLord=vp.varshesh;
  // COVER
  pg('<div class="cover" style="min-height:900px;"><div style="font-size:50px;color:var(--gold);">🕉️</div>'
    +'<h1 style="font-size:30px;margin:10px 0;">'+T(L.title)+' '+CTX.forYear+'</h1>'
    +'<div class="sub" style="font-size:14px;">'+T(L.subtitle)+' · शुभ दिन</div>'
    +'<div style="font-size:25px;color:#8B2B33;font-weight:700;margin:22px 0 2px;">'+CTX.name+'</div>'
    +'<div class="sub">'+U('annual.turningAge')+' '+vp.ageYears+'</div>'
    +'<div class="idcard" style="margin-top:26px;min-width:320px;"><div class="t">'+T(L.yearLord)+'</div>'
    +'<div class="v">'+gname2(vLord)+'</div></div></div>');
  // EXEC SUMMARY
  var mh=vp.muntha.house;
  var favMuntha=[1,5,9,10,11].indexOf(mh)>=0;
  pg('<h2 class="sec">✨ '+T(L.summary)+'</h2>'
    +'<div class="idcard"><div class="t">'+T(L.yearLord)+'</div><div class="v">'+gname2(vLord)+'</div>'
    +'<div style="font-size:13px;color:#8B5A2B;margin-top:4px;">'+T(N.varshesh[vLord]).split('.').slice(0,1).join('.')+'.</div></div>'
    +'<div class="two" style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">'
    +'<div class="idcard"><div class="t">'+T(L.varshaLagna)+'</div><div class="v" style="font-size:16px;">'+term('rashi',vp.chart.lagna.en)+'</div></div>'
    +'<div class="idcard'+(favMuntha?' ok':'')+'" style="'+(favMuntha?'background:#F2F8EF;':'')+'"><div class="t">'+T(L.munthaLabel)+'</div><div class="v" style="font-size:16px;">'+term('rashi',vp.muntha.en)+' · '+U('annual.hShort')+mh+'</div></div></div>'
    +'<div class="prose" style="font-size:11.5px;color:#8B5A2B;">'+T(L.method)+'</div>');
  // YEAR CHARACTER (varshesh) + MUNTHA FOCUS
  pg('<h2 class="sec">🎭 '+T(L.yearTheme)+'</h2><div class="prose">'+T(N.varshesh[vLord])+'</div>'
    +'<h2 class="sec">🎯 '+T(L.munthaTheme)+'</h2><div class="prose">'+T(N.muntha[mh])+'</div>');
  // VARSHAPHAL CHART TABLE
  var posRows=vp.chart.grahas.map(function(g){
    return '<tr><td>'+gname2(g.key)+'</td><td>'+term('rashi',g.rashi.en)+'</td><td>'+g.house+'</td><td>'+term('nakshatra',g.nakshatra.en)+'</td></tr>';
  }).join('');
  pg('<h2 class="sec">🪐 '+T(L.chart)+'</h2>'
    +'<div class="prose" style="font-size:13px;color:#8B5A2B;">'+T(L.solarReturn)+': '+fDT(vp.returnInstant)+'</div>'
    +'<table><tr><th>'+U('annual.planet')+'</th><th>'+U('annual.sign')+'</th><th>'+U('annual.houseCol')+'</th><th>'+U('annual.nakshatraCol')+'</th></tr>'+posRows+'</table>');
  // MONTH-BY-MONTH (dasha-of-month based tone)
  var dz=PE.getVimshottariDasha(b);
  function dashaAtMonth(t){
    for(var m=0;m<dz.mahadashas.length;m++){var md=dz.mahadashas[m];
      if(md.start.getTime()<=t&&md.end.getTime()>t){var al=md.lord;
        for(var a=0;a<md.antardashas.length;a++){var ad=md.antardashas[a];if(ad.start.getTime()<=t&&ad.end.getTime()>t){
          var pl=PE.dashaSubPeriods(ad.lord,ad.start.getTime(),ad.end.getTime());
          for(var p=0;p<pl.length;p++)if(pl[p].start.getTime()<=t&&pl[p].end.getTime()>t){
            var pr=pl[p];
            // go one level finer (sookshma) so each month gets more individual character
            var sk=PE.dashaSubPeriods(pr.lord,pr.start.getTime(),pr.end.getTime());
            for(var s=0;s<sk.length;s++)if(sk[s].start.getTime()<=t&&sk[s].end.getTime()>t)
              return{maha:md.lord,antar:ad.lord,praty:pr.lord,sookshma:sk[s].lord};
            return{maha:md.lord,antar:ad.lord,praty:pr.lord,sookshma:pr.lord};
          }
          return{maha:md.lord,antar:ad.lord,praty:ad.lord,sookshma:ad.lord};
        }}
        return{maha:md.lord,antar:al,praty:al,sookshma:al};
      }}
    return null;
  }
  var MAITRI=PE.MAITRI||{};
  function monthTone(d){ // sookshma lord vs maha lord friendship -> tone (finest granularity)
    if(!d)return 0;
    var lord=d.sookshma||d.praty;
    var rel=(MAITRI[d.maha]&&MAITRI[d.maha][lord]!==undefined)?MAITRI[d.maha][lord]:1;
    if(lord===d.maha)return 1;
    var ben=['jupiter','venus','mercury','moon'];
    var b1=ben.indexOf(lord)>=0?1:0;
    return (rel===2?1:rel===0?-1:0)+b1-(['saturn','rahu','ketu','mars'].indexOf(lord)>=0?1:0);
  }
  var mcards=[];
  for(var mo=0;mo<12;mo++){
    var mt=Date.UTC(CTX.forYear,mo,15);
    var d=dashaAtMonth(mt);
    var tone=monthTone(d);
    var col=tone>0?'#2B8B5A':tone<0?'#B8434A':'#E8A317';
    var lbl=tone>0?T(L.favourable):tone<0?T(L.care):T(L.steady);
    var ruler=d?(d.sookshma||d.praty):null;
    var hint=ruler&&N.monthHint[ruler]?N.monthHint[ruler]:null;
    var ML=N.mLabels;
    var hintHtml='';
    if(hint){
      hintHtml='<div style="font-size:11.5px;line-height:1.55;margin-top:4px;">'
        +'<span style="color:#8B5A2B;">'+T(ML.focus)+':</span> '+hintText(hint,'focus')+'<br>'
        +'<span style="color:#2B7A4B;">'+T(ML.opp)+':</span> '+hintText(hint,'opp')+'<br>'
        +'<span style="color:#B8434A;">'+T(ML.avoid)+':</span> '+hintText(hint,'avoid')+'</div>';
    }
    mcards.push('<div class="mcard"><div class="mh"><span>'+monthName(mo)+'</span><span class="mdot" style="background:'+col+';"></span></div>'
      +'<div style="font-size:11px;color:var(--soft);">'+(d?gname2(d.praty)+' / '+gname2(ruler):'')+' · <span style="color:'+col+';font-weight:600;">'+lbl+'</span></div>'
      +hintHtml+'</div>');
  }
  pg('<h2 class="sec">📆 '+T(L.months)+'</h2><div class="mgrid">'+mcards.join('')+'</div>');
  // AUSPICIOUS DATES (griha/business-neutral: use business rules as general auspicious)
  var fromD=new Date(Date.UTC(CTX.forYear,0,1)), toD=new Date(Date.UTC(CTX.forYear,11,31));
  var mh2=PE.findMuhurta('business',b,CTX.clat,CTX.clng,fromD,toD,6);
  var dts=mh2.results.slice(0,6).map(function(r){
    return '<div class="yog ok" style="font-size:13.5px;"><b>'+fD(r.date)+'</b> · '+term('nakshatra',r.nakshatra.en)+' · '+term('weekday',r.weekday.en)+'</div>';
  }).join('');
  pg('<h2 class="sec">🗓️ '+T(L.bestDates)+'</h2>'
    +'<div class="prose" style="font-size:13px;color:#8B5A2B;">'+U('annual.auspiciousIntro')+'</div>'+dts);
  // REMEDIES + FOOTER (year lord remedy)
  var rem=[vLord].map(function(k){var r=C.remedy[k];return r?'<div class="yog"><b>'+(U('mantraLabel.'+k)||r.name)+'</b> — <span style="color:#8B2B33;">'+r.mantra+'</span><br>'+((window.SD_UI&&SD_UI.remedy&&SD_UI.remedy[k]&&SD_UI.remedy[k][LANG])||(LANG==='hi'?r.hi:r.en))+'</div>':'';}).join('');
  pg('<h2 class="sec">🙏 '+T(L.remedies)+'</h2>'
    +'<div class="prose" style="font-size:13px;">'+U('annual.remedyIntroPre')+gname2(vLord)+U('annual.remedyIntroPost')+'</div>'+rem
    +'<div class="foot">'+T(L.disclaimer)+'<br><b>शुभ दिन · shubhdin.app</b> · '+new Date().toLocaleDateString('en-IN')+'</div>');
  document.getElementById('report').innerHTML=H;
  var rep=document.getElementById('report');
  rep.className='lang-'+LANG;
  rep.setAttribute('lang',LANG);
  rep.style.display='block';
  document.getElementById('printbar').style.display='block';
  document.getElementById('inputScreen').style.display='none';
  window.scrollTo(0,0);
} catch(err){ alert('Report generation error: '+err.message+'\n\nLikely an outdated cached file — hard-refresh (Ctrl+Shift+R) and retry.'); console.error(err); } }
</script>
