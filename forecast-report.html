<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shubh Din — 10-Year Life Forecast</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Devanagari:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#5C1A1B;--gold:#B8860B;--gold2:#D4A843;--paper:#FFFDF6;--soft:#8B5A2B;--saffron:#E8730C;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important;}
body{background:#EFE9DC;font-family:'Noto Serif Devanagari',serif;color:var(--ink);}
.screen{max-width:720px;margin:24px auto;background:var(--paper);border:1px solid var(--gold2);border-radius:12px;padding:28px;}
h1.brand{font-size:23px;text-align:center;}
.sub{text-align:center;color:var(--soft);font-size:13px;margin:4px 0 16px;}
label{display:block;font-size:12px;color:var(--soft);margin:8px 0 3px;}
input,select,button{font-family:inherit;font-size:14px;padding:8px 9px;border:1px solid var(--gold2);border-radius:8px;background:#fff;color:var(--ink);width:100%;}
button{background:linear-gradient(135deg,#8B2B33,#5C1A1B);color:#FFE8C8;border:none;cursor:pointer;margin-top:14px;font-size:15px;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.confirm{background:#FFF6E3;border:1px dashed var(--gold);border-radius:10px;padding:12px;margin-top:14px;display:none;font-size:14px;line-height:1.8;}
.langToggle{display:flex;gap:8px;margin-top:8px;}
.langToggle button{margin:0;background:#fff;color:var(--ink);border:1px solid var(--gold2);}
.langToggle button.on{background:var(--ink);color:#FFE8C8;}
#report{display:none;}
.page{max-width:794px;margin:16px auto;background:var(--paper);padding:46px 50px;box-shadow:0 2px 14px rgba(92,26,27,.12);position:relative;min-height:1000px;}
.page::before{content:"";position:absolute;inset:14px;border:1.5px solid var(--gold2);border-radius:4px;pointer-events:none;}
.cover{display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;}
h2.sec{font-size:21px;color:var(--saffron);border-bottom:2px solid var(--gold2);padding-bottom:6px;margin:6px 0 14px;}
.prose{font-size:15px;line-height:1.85;text-align:justify;margin-bottom:12px;}
.idcard{background:#FFF6E3;border:1px solid var(--gold2);border-radius:10px;padding:12px 14px;margin-bottom:12px;}
.idcard .t{font-size:11.5px;color:var(--soft);}
.idcard .v{font-size:18px;color:#8B2B33;font-weight:700;margin-top:2px;}
.ovrow{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px dashed #E4D3AE;font-size:14px;}
.ovyear{font-weight:700;width:52px;}
.ovbadge{border-radius:8px;padding:1px 9px;font-size:12px;font-weight:700;color:#fff;}
.ovbar{flex:1;height:9px;background:#EFE9DC;border-radius:6px;overflow:hidden;}
.ovbar>div{height:100%;}
.ycard{border:1px solid var(--gold2);border-radius:12px;padding:14px 16px;margin-bottom:14px;background:#FDF8EC;}
.ycard .yhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.ycard .yy{font-size:22px;color:#8B2B33;font-weight:700;}
.ycard .age{font-size:12px;color:var(--soft);}
.ycard .badge{border-radius:10px;padding:2px 12px;font-size:12px;font-weight:700;color:#fff;}
.ycard .line{font-size:13.5px;color:#5C1A1B;margin:3px 0;}
.domgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:8px 0;}
.domitem{font-size:12.5px;padding:5px 8px;border-radius:7px;}
.act{font-size:13px;color:#2B7A4B;margin-top:6px;padding-top:6px;border-top:1px dashed #E4D3AE;}
.foot{font-size:12px;color:var(--soft);border-top:1px solid var(--gold2);padding-top:10px;margin-top:20px;line-height:1.7;}
.printbar{max-width:794px;margin:10px auto;text-align:center;}
.printbar button{width:auto;padding:10px 26px;}
@media print{body{background:#fff;}.screen,.printbar{display:none !important;}#report{display:block !important;}
.page{box-shadow:none;margin:0;page-break-after:always;min-height:auto;padding:34px 40px;}.page:last-child{page-break-after:auto;}
.ycard{page-break-inside:avoid;}}
@page{size:A4;margin:10mm;}

/* devanagari-print-safety: letter-spacing splits matras/conjuncts (दि ल). Never apply to Indic text. */
body,.page,.prose,.idcard,.yog,td,th,h1,h2,div,span{letter-spacing:normal;}
.stars,.scorepill{letter-spacing:2px;}
@media print{*{-webkit-font-feature-settings:"liga" 1,"kern" 1;font-feature-settings:"liga" 1,"kern" 1;}}
</style>
</head>
<body>
<div class="screen" id="inputScreen">
  <h1 class="brand">🔮 शुभ दिन — 10-Year Life Forecast</h1>
  <div class="sub">Year by year · Dasha + transits + what to do · An honest arc, not empty promises</div>
  <div class="row">
    <div><label>Name / नाम</label><input id="pname" value=""></div>
    <div><label>Start year / आरंभ वर्ष</label><input id="startyr" type="number" value="2026"></div>
  </div>
  <div class="row">
    <div><label>Birth Date</label><input id="bdate" type="date" value="1996-12-06"></div>
    <div><label>Birth Time (24h)</label><input id="btime" type="time" value="15:47"></div>
  </div>
  <div class="row">
    <div><label>Latitude</label><input id="blat" type="number" step="0.0001" value="16.4343"></div>
    <div><label>Longitude</label><input id="blng" type="number" step="0.0001" value="81.6985"></div>
  </div>
  <label>Birth Place / जन्म स्थान</label><input id="bplace" value="Narasapur, AP">
  <div class="langToggle"><button id="lEn" class="on" onclick="setLang('en')">English</button><button id="lHi" onclick="setLang('hi')">हिन्दी</button></div>
  <button onclick="confirmStep()">Check Birth Details → जाँचें</button>
  <div class="confirm" id="confirmBox">
    <div id="confirmText"></div>
    <div class="row">
      <button style="background:#5A8B2B;" onclick="generate()">✓ Correct — Generate</button>
      <button style="background:#B8434A;" onclick="document.getElementById('confirmBox').style.display='none'">✗ Fix details</button>
    </div>
  </div>
</div>
<div class="printbar" id="printbar" style="display:none;"><button onclick="window.print()">🖨️ Print / Save as PDF</button></div>
<div id="report"></div>

<script src="astronomy.min.js"></script>
<script src="panchang-engine.js"></script>
<script src="report-content.js"></script>
<script src="forecast-content.js"></script>
<script>
var LANG='en', CTX=null;
function setLang(l){LANG=l;document.getElementById('lEn').className=l==='en'?'on':'';document.getElementById('lHi').className=l==='hi'?'on':'';}
function T(o){return o?(o[LANG]||o.en):'';}
var GR_HI={sun:'सूर्य',moon:'चंद्र',mars:'मंगल',mercury:'बुध',jupiter:'गुरु',venus:'शुक्र',saturn:'शनि',rahu:'राहु',ketu:'केतु'};
function gname2(k){return k?(LANG==='hi'?(GR_HI[k]||k):k.charAt(0).toUpperCase()+k.slice(1)):'';}
function ist(d){return new Date(d.getTime()+5.5*3600000);}
var RATING_COLOR={excellent:'#2B8B5A',good:'#5AA84B',mixed:'#E8A317',testing:'#E8730C',challenging:'#B8434A'};
function birthUTC(){
  var dv=document.getElementById('bdate').value.split('-').map(Number);
  var tv=document.getElementById('btime').value.split(':').map(Number);
  return new Date(Date.UTC(dv[0],dv[1]-1,dv[2],tv[0],tv[1],0)-5.5*3600000);
}
function confirmStep(){
  var PE=window.PanchangEngine;
  var b=birthUTC(),lat=+document.getElementById('blat').value,lng=+document.getElementById('blng').value;
  var bc=PE.getBirthChart(b,lat,lng); var moon=bc.grahas.find(function(x){return x.key==='moon';});
  CTX={b:b,lat:lat,lng:lng,name:document.getElementById('pname').value||'—',
       startYear:parseInt(document.getElementById('startyr').value)||new Date().getFullYear()};
  document.getElementById('confirmText').innerHTML=(LANG==='hi'
    ?'<b>लग्न:</b> '+bc.lagna.hi+' · <b>चंद्र राशि:</b> '+moon.rashi.hi+' · <b>नक्षत्र:</b> '+moon.nakshatra.hi
    :'<b>Lagna:</b> '+bc.lagna.en+' · <b>Moon:</b> '+moon.rashi.en+' · <b>Nakshatra:</b> '+moon.nakshatra.en)
    +'<br>'+(LANG==='hi'?'सही हो तो '+CTX.startYear+' से 10 वर्ष की भविष्यवाणी बनाएँ':'If correct, generate 10 years from '+CTX.startYear);
  document.getElementById('confirmBox').style.display='block';
}
function generate(){ try {
  var PE=window.PanchangEngine, Y=window.SD_FORECAST, C=window.SD_CONTENT;
  if(!PE||!PE.getYearForecast){alert('Engine not fully loaded. Please hard-refresh (Ctrl+Shift+R).');return;}
  if(!Y||!C){alert('Content files missing. Ensure forecast-content.js and report-content.js are in the same folder.');return;}
  if(!CTX){alert('Please click "Check Birth Details" first.');return;}
  var L=Y.labels, H='';
  function pg(inner){H+='<div class="page">'+inner+'</div>';}
  var fc=PE.getYearForecast(CTX.b,CTX.lat,CTX.lng,CTX.startYear,10);
  // COVER
  pg('<div class="cover" style="min-height:900px;"><div style="font-size:50px;color:var(--gold);">🕉️</div>'
    +'<h1 style="font-size:31px;margin:10px 0;">'+(LANG==='hi'?'जीवन रोडमैप':'Your Life Roadmap')+'<br><span style="font-size:18px;color:var(--soft);">'+CTX.startYear+' – '+(CTX.startYear+9)+'</span></h1>'
    +'<div class="sub" style="font-size:14px;">'+(LANG==='hi'?'आपके अगले 10 वर्ष — दशा, गोचर और क्या करें':'Your Next 10 Years — dasha, transits and what to do')+' · शुभ दिन</div>'
    +'<div style="font-size:25px;color:#8B2B33;font-weight:700;margin:22px 0 2px;">'+CTX.name+'</div>'
    +'<div class="sub">'+CTX.startYear+' – '+(CTX.startYear+9)+' &nbsp;·&nbsp; '+(LANG==='hi'?'चंद्र राशि':'Moon sign')+': '+(LANG==='hi'?fc.moonRashi.hi:fc.moonRashi.en)+'</div>'
    +(fc.currentDasha?'<div class="idcard" style="margin-top:24px;min-width:300px;"><div class="t">'+T(L.period)+'</div><div class="v">'+gname2(fc.currentDasha.maha)+' – '+gname2(fc.currentDasha.antar)+'</div></div>':'')+'</div>');
  // OVERVIEW STRIP
  var ov=fc.years.map(function(y){
    var col=RATING_COLOR[y.rating], pct=Math.round((y.tone+3)/6*100);
    return '<div class="ovrow"><div class="ovyear">'+y.year+'</div>'
      +'<div class="ovbadge" style="background:'+col+';">'+T({en:Y.ratings[y.rating].t_en,hi:Y.ratings[y.rating].t_hi}).split(' ').slice(0,2).join(' ')+'</div>'
      +'<div class="ovbar"><div style="width:'+pct+'%;background:'+col+';"></div></div>'
      +'<div style="font-size:12px;color:var(--soft);width:120px;text-align:right;">'+gname2(y.maha)+'/'+gname2(y.antar)+'</div></div>';
  }).join('');
  pg('<h2 class="sec">📊 '+T(L.overview)+'</h2>'+ov+'<div class="prose" style="font-size:11.5px;color:#8B5A2B;margin-top:10px;">'+T(L.method)+'</div>');
  // SPOTLIGHT FULL PAGES (best + caution years get their own page)
  function starStr(n){return '<span style="color:#E8730C;letter-spacing:2px;">'+'\u2605'.repeat(n)+'</span><span style="color:#D4A843;letter-spacing:2px;">'+'\u2606'.repeat(5-n)+'</span>';}
  function spotlightPage(y, kind){
    var SL=Y.spotLabels, d=y.domains;
    var isBest=kind==='best';
    var head=isBest?T(SL.bright):T(SL.caution);
    var col=isBest?'#2B8B5A':'#B8434A';
    var intro=isBest?T(Y.spotlightBest):T(Y.spotlightCaution);
    var domRows=[['career',SL.career],['money',SL.money],['marriage',SL.marriage],['health',SL.health],['travel',SL.travel],['invest',SL.invest]].map(function(dd){
      return '<div style="display:flex;justify-content:space-between;font-size:15px;padding:6px 0;border-bottom:1px dashed #E4D3AE;"><span>'+T(dd[1])+'</span><span style="font-size:17px;">'+starStr(d[dd[0]])+'</span></div>';
    }).join('');
    // opportunities from high-star domains; risks from low-star + rating
    var opps=[], risks=[];
    if(isBest){
      if(d.career>=4)opps.push(T(Y.opp.career));
      if(d.money>=4)opps.push(T(Y.opp.wealth));
      if(d.invest>=4)opps.push(T(Y.opp.business));
      if(d.marriage>=4)opps.push(T(Y.opp.marriage));
      if(d.travel>=4)opps.push(T(Y.opp.travel));
      if(opps.length<2)opps.push(T(Y.opp.learning));
      risks.push(T(Y.risk.overconfidence));
    } else {
      if(d.money<=2)risks.push(T(Y.risk.loans)), risks.push(T(Y.risk.speculation));
      if(d.health<=3)risks.push(T(Y.risk.burnout)), risks.push(T(Y.risk.health));
      if(d.career<=2)risks.push(T(Y.risk.conflict));
      if(risks.length<2)risks.push(T(Y.risk.overconfidence));
    }
    var strat=isBest
      ?(LANG==='hi'?'इस वर्ष की गति का पूरा लाभ लें — बड़े निर्णय, निवेश और पहल अभी करें। अवसर की खिड़की खुली है।':'Ride this year\u2019s momentum fully — make big decisions, investments and initiatives now. The window of opportunity is open.')
      :(LANG==='hi'?'लाभ सुरक्षित रखें, बचत बढ़ाएँ, स्वास्थ्य को प्राथमिकता दें और बड़े जोखिम टालें। यह वर्ष धैर्य से पार करने का है।':'Protect your gains, increase savings, prioritize health, and avoid big risks. This is a year to cross with patience.');
    var uniqOpps=opps.filter(function(v,i,a){return a.indexOf(v)===i;});
    var uniqRisks=risks.filter(function(v,i,a){return a.indexOf(v)===i;});
    pg('<h2 class="sec" style="color:'+col+';border-color:'+col+';">'+head+' — '+y.year+'</h2>'
      +'<div style="text-align:center;font-size:20px;color:'+col+';font-weight:700;margin-bottom:4px;">'+T(Y.persona[y.persona])+'</div>'
      +'<div class="sub" style="font-size:13px;">'+(LANG==='hi'?'आयु':'Age')+' '+y.age+' · '+gname2(y.maha)+' – '+gname2(y.antar)+'</div>'
      +'<div class="prose" style="margin-top:10px;">'+intro+'</div>'
      +'<div class="idcard"><div class="t">'+T(SL.domains)+'</div>'+domRows+'</div>'
      +'<div class="two" style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">'
      +(isBest?'<div class="idcard" style="background:#F2F8EF;"><div class="t" style="color:#2B7A4B;">'+T(SL.opportunities)+'</div><div style="font-size:14px;line-height:2;margin-top:4px;">'+uniqOpps.map(function(o){return '\u2705 '+o;}).join('<br>')+'</div></div>':'')
      +'<div class="idcard" style="background:#FFF3F0;"><div class="t" style="color:#B8434A;">'+T(SL.avoid)+'</div><div style="font-size:14px;line-height:2;margin-top:4px;">'+uniqRisks.map(function(r){return '\u274C '+r;}).join('<br>')+'</div></div>'
      +(isBest?'':'<div class="idcard" style="background:#F2F8EF;"><div class="t" style="color:#2B7A4B;">'+T(SL.strategy)+'</div><div style="font-size:14px;line-height:1.8;margin-top:4px;">'+strat+'</div></div>')
      +'</div>'
      +(isBest?'<div class="idcard" style="background:#FFF6E3;margin-top:2px;"><div class="t">'+T(SL.strategy)+'</div><div class="prose" style="margin:4px 0 0;">'+strat+'</div></div>':''));
  }
  var bestY=fc.years.find(function(y){return y.spotlight==='best';});
  var cautionY=fc.years.find(function(y){return y.spotlight==='caution';});
  if(bestY)spotlightPage(bestY,'best');
  if(cautionY)spotlightPage(cautionY,'caution');
  // PER-YEAR CARDS
  function domClass(tone){return tone>0?{bg:'#F2F8EF',c:'#2B7A4B',lbl:T(L.favourable)}:tone<0?{bg:'#FFF3F0',c:'#B8434A',lbl:T(L.attention)}:{bg:'#FBF6E8',c:'#8B5A2B',lbl:T(L.steady)};}
  function transitTone(planet,h){if(h===null)return 0;
    if(planet==='jupiter')return [2,5,7,9,11].indexOf(h)>=0?1:([3,6,10].indexOf(h)>=0?-1:0);
    if(planet==='saturn')return [3,6,11].indexOf(h)>=0?1:([1,2,4,8,12].indexOf(h)>=0?-1:0);
    if(planet==='rahu')return [3,6,10,11].indexOf(h)>=0?1:([1,5,8,12].indexOf(h)>=0?-1:0);
    return 0;}
  var cards=fc.years.map(function(y){
    var rt=Y.ratings[y.rating], col=RATING_COLOR[y.rating];
    var jT=y.jTone, sT=y.sTone, rT=y.rTone;
    var career=domClass(sT+ (y.jupiterHouse&&[10,11,2].indexOf(y.jupiterHouse)>=0?1:0));
    var money=domClass(jT + (y.rahuHouse&&[2,11].indexOf(y.rahuHouse)>=0?1:0));
    var rel=domClass((y.jupiterHouse&&[7,5,11].indexOf(y.jupiterHouse)>=0?1:0) + (y.saturnHouse&&[7].indexOf(y.saturnHouse)>=0?-1:0));
    var health=domClass(sT + (y.saturnHouse&&[1,8].indexOf(y.saturnHouse)>=0?-1:0));
    function dom(label,d){return '<div class="domitem" style="background:'+d.bg+';color:'+d.c+';"><b>'+label+':</b> '+d.lbl+'</div>';}
    var personaName = y.persona&&Y.persona[y.persona] ? T(Y.persona[y.persona]) : '';
    function personalTheme(lord){
      if(!lord||!Y.houseArea) return lord&&Y.theme[lord]?T(Y.theme[lord]):'';
      var houses=(fc.rulesHouses[lord]||[]).slice();
      var sits=fc.planetHouse[lord];
      if(sits && houses.indexOf(sits)<0) houses.push(sits);
      if(!houses.length) return Y.theme[lord]?T(Y.theme[lord]):'';
      var pick=houses.slice(0,2);
      var areas=pick.map(function(hh){return Y.houseArea[hh]?T(Y.houseArea[hh]):'';}).filter(Boolean);
      var dig=fc.dignity[lord];
      var join = (dig==='Exalted'||dig==='Own Sign') ? Y.themeJoin.strong : dig==='Debilitated' ? Y.themeJoin.weak : Y.themeJoin.normal;
      var areaStr = areas.length>1 ? areas[0]+(LANG==='hi'?'; साथ ही ':'; also ')+areas[1] : areas[0];
      return gname2(lord)+' '+T(join)+' '+areaStr;
    }
    var themeTxt = personalTheme(y.antar) || personalTheme(y.maha);
    var spotMark = y.spotlight==='best'?' <span style="color:#2B8B5A;font-size:12px;">'+T(Y.spotLabels.bright)+'</span>':y.spotlight==='caution'?' <span style="color:#B8434A;font-size:12px;">'+T(Y.spotLabels.caution)+'</span>':'';
    return '<div class="ycard"><div class="yhead"><div><span class="yy">'+y.year+'</span> <span class="age">('+(LANG==='hi'?'आयु':'age')+' '+y.age+')</span>'+spotMark+'</div>'
      +'<div class="badge" style="background:'+col+';">'+personaName+'</div></div>'
      +'<div class="line"><b>'+T(L.period)+':</b> '+gname2(y.maha)+' – '+gname2(y.antar)+' &nbsp;·&nbsp; <b>'+T(L.theme)+':</b> '+themeTxt+'</div>'
      +'<div class="line">'+T(rt)+'</div>'
      +'<div class="domgrid">'+dom(T(Y.domain.career),career)+dom(T(Y.domain.money),money)+dom(T(Y.domain.relationships),rel)+dom(T(Y.domain.health),health)+'</div>'
      +'<div class="act">\u2705 <b>'+T(L.action)+':</b> '+T(Y.action[y.rating])+'</div></div>';
  });
  // 3 cards per page
  for(var i=0;i<cards.length;i+=3){
    pg('<h2 class="sec">'+(i===0?'\uD83D\uDCC5 '+(LANG==='hi'?'वर्ष-दर-वर्ष':'Year by Year'):'\uD83D\uDCC5 '+(LANG==='hi'?'वर्ष-दर-वर्ष (क्रमशः)':'Year by Year (contd.)'))+'</h2>'+cards.slice(i,i+3).join(''));
  }
  // FOOTER
  pg('<h2 class="sec">🙏 '+(LANG==='hi'?'समापन':'Closing')+'</h2>'
    +'<div class="prose">'+(LANG==='hi'?'यह दशक शुभ और परीक्षा दोनों वर्षों का मिश्रण है — जैसा हर जीवन होता है। शुभ वर्षों में साहस से आगे बढ़ें, परीक्षा के वर्षों में धैर्य और उपायों का सहारा लें। ज्योतिष मार्ग दिखाता है; चलना आपको है।':'This decade blends auspicious and testing years — as every life does. Move boldly in the bright years, lean on patience and remedies in the testing ones. Astrology shows the road; the walking is yours.')+'</div>'
    +'<div class="foot">'+T(L.disclaimer)+'<br><b>शुभ दिन · shubhdin.app</b> · '+new Date().toLocaleDateString('en-IN')+'</div>');
  document.getElementById('report').innerHTML=H;
  document.getElementById('report').style.display='block';
  document.getElementById('printbar').style.display='block';
  document.getElementById('inputScreen').style.display='none';
  window.scrollTo(0,0);
