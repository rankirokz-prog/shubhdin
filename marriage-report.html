/* โโ DEVANAGARI SHAPING SAFETY โโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโโ
   A Latin-first font stack (e.g. 'Cormorant Garamond' first) forces the browser

#report.lang-hi, #report.lang-hi *{

function sdPrint(){

  try{
    if(document.fonts && document.fonts.ready){
      document.fonts.ready.then(function(){ setTimeout(function(){ window.print(); }, 60); });

}

  var KO=(gm&&gm.kootas)?gm.kootas:[];
  function kpts(name){var k=KO.find(function(x){return x.koota===name;});return k?(k.obtained||0):0;}
  function lordOfHouse(bc,h){return RL[bc.d1[h-1].rashiIndex];}

  function band(v){return v>=74?'strong':(v>=60?'avg':'care');}

  // COVER
  pg('<div class="cover" style="min-height:900px;"><div style="font-size:50px;color:var(--gold);">๐๏ธ</div>'
    +'<h1 style="font-size:34px;margin:10px 0;">'+T(L.title)+'</h1>'
    +'<div class="sub" style="font-size:14px;">เคถเฅเคญ เคฆเคฟเคจ ยท shubhdin.app</div>'

      :'This is a favourable match according to classical compatibility principles. The emotional foundation is strong, and the identified challenges are manageable through communication, mutual respect, and the suggested remedies.';
    pg('<h2 class="sec">\u2728 '+(LANG==='hi'?'เคธเคพเคฐเคพเคเคถ':'Executive Summary')+'</h2>'
      +'<div style="text-align:center;margin:6px 0 18px;"><div class="t" style="font-size:12px;color:#8B5A2B;">'+(LANG==='hi'?'เคธเคฎเคเฅเคฐ เคฎเคฟเคฒเคพเคจ':'OVERALL MATCH')+'</div>'+starStr+'</div>'
