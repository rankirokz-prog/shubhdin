<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shubh Din — Your Love Story</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Devanagari:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Telugu:wght@400;500;600;700&display=block" rel="stylesheet">
<style>
:root{--ink:#4A1628;--rose:#B03A5B;--gold:#B8860B;--gold2:#D4A843;--paper:#FFFCF8;--soft:#8B5A6B;--blush:#E8A0B4;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important;}
body{background:#F0E6E9;font-family:'Noto Serif Devanagari',serif;color:var(--ink);}
.screen{max-width:640px;margin:24px auto;background:var(--paper);border:1px solid var(--blush);border-radius:14px;padding:28px;}
h1.brand{font-size:23px;text-align:center;color:var(--rose);}
.sub{text-align:center;color:var(--soft);font-size:13px;margin:4px 0 16px;}
label{display:block;font-size:12px;color:var(--soft);margin:8px 0 3px;}
input,select,button{font-family:inherit;font-size:14px;padding:8px 9px;border:1px solid var(--blush);border-radius:8px;background:#fff;color:var(--ink);width:100%;}
button{background:linear-gradient(135deg,#C24E6E,#8B2848);color:#FFF0F4;border:none;cursor:pointer;margin-top:14px;font-size:15px;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.confirm{background:#FBEEF2;border:1px dashed var(--rose);border-radius:10px;padding:12px;margin-top:14px;display:none;font-size:14px;line-height:1.8;}
.langToggle{display:flex;gap:8px;margin-top:8px;}
.langToggle button{margin:0;background:#fff;color:var(--ink);border:1px solid var(--blush);}
.langToggle button.on{background:var(--rose);color:#FFF0F4;}
#report{display:none;}
.page{max-width:794px;margin:16px auto;background:var(--paper);padding:48px 52px;box-shadow:0 2px 16px rgba(74,22,40,.14);position:relative;min-height:1000px;}
.page::before{content:"";position:absolute;inset:14px;border:1.5px solid var(--blush);border-radius:6px;pointer-events:none;}
.cover{display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;}
h2.sec{font-family:'Cormorant Garamond','Noto Serif Devanagari','Noto Serif Devanagari',serif;font-size:26px;color:var(--rose);border-bottom:1.5px solid var(--blush);padding-bottom:6px;margin:6px 0 16px;font-weight:600;}
.prose{font-size:15.5px;line-height:1.95;text-align:justify;margin-bottom:12px;}
.poetic{font-family:'Cormorant Garamond','Noto Serif Devanagari','Noto Serif Devanagari',serif;font-size:18px;line-height:1.9;font-style:italic;color:#6B2440;text-align:center;margin:14px 20px;}
.idcard{background:#FBEEF2;border:1px solid var(--blush);border-radius:12px;padding:14px 16px;margin-bottom:12px;text-align:center;}
.idcard .t{font-size:11.5px;color:var(--soft);text-transform:uppercase;}
.idcard .v{font-size:22px;color:var(--rose);font-weight:700;margin-top:4px;}
.elembadge{display:inline-block;font-family:'Cormorant Garamond','Noto Serif Devanagari',serif;font-size:20px;color:#fff;border-radius:20px;padding:4px 20px;margin:8px 0;font-weight:600;}
.barwrap{margin:14px 0;}
.barlbl{display:flex;justify-content:space-between;font-size:15px;margin-bottom:4px;}
.bar{background:#F0DEE4;border-radius:8px;height:13px;overflow:hidden;}
.bar>div{height:100%;background:linear-gradient(90deg,#E8A0B4,#B03A5B);}
.season{background:#FBEEF2;border-left:4px solid var(--rose);padding:11px 14px;margin-bottom:10px;font-size:14.5px;line-height:1.75;border-radius:0 8px 8px 0;}
.foot{font-size:12px;color:var(--soft);border-top:1px solid var(--blush);padding-top:10px;margin-top:20px;line-height:1.7;text-align:center;}
.heart{color:var(--rose);font-size:40px;}
.printbar{max-width:794px;margin:10px auto;text-align:center;}
.printbar button{width:auto;padding:10px 26px;}
@media print{body{background:#fff;}.screen,.printbar{display:none !important;}#report{display:block !important;}
.page{box-shadow:none;margin:0;page-break-after:always;min-height:auto;padding:36px 42px;}.page:last-child{page-break-after:auto;}
.season{page-break-inside:avoid;}}
@page{size:A4;margin:10mm;}

/* devanagari-print-safety: letter-spacing splits matras/conjuncts (दि ल). Never apply to Indic text. */
body,.page,.prose,.idcard,.yog,td,th,h1,h2,div,span{letter-spacing:normal;}
.stars,.scorepill{letter-spacing:2px;}
@media print{*{-webkit-font-feature-settings:"liga" 1,"kern" 1;font-feature-settings:"liga" 1,"kern" 1;}}

/* ── DEVANAGARI SHAPING SAFETY ──────────────────────────────────────────────
   A Latin-first font stack (e.g. 'Cormorant Garamond' first) forces the browser
   into PER-CHARACTER font fallback for Hindi. Shaping a syllable cluster across
   two font runs splits matras/conjuncts:  करियर → "करि यर",  बातचीत → "बा तची त".
   Fix: when the report renders in Hindi, use ONE complete Devanagari font for
   everything, and disable anything that can insert space inside a cluster. */
#report.lang-hi, #report.lang-hi *{
  font-family:'Noto Serif Devanagari','Nirmala UI','Mangal','Kokila',serif !important;
  letter-spacing:normal !important;
  word-spacing:normal !important;
  word-break:normal !important;
  overflow-wrap:normal !important;
  font-synthesis:none;               /* faux-bold can break conjunct shaping */
  text-rendering:auto;
}
#report.lang-hi .prose{text-align:left;}   /* justify stretches Indic awkwardly */
@media print{
  #report.lang-hi, #report.lang-hi *{
    font-family:'Noto Serif Devanagari','Nirmala UI','Mangal',serif !important;
    letter-spacing:normal !important;
  }
}

/* Telugu: same single-font shaping law as Devanagari (§10.2 / §T6) */
#report.lang-te, #report.lang-te *{
  font-family:'Noto Serif Telugu','Gautami','Nirmala UI',serif !important;
  letter-spacing:normal !important; word-spacing:normal !important;
  word-break:normal !important; overflow-wrap:normal !important;
  font-synthesis:none; text-rendering:auto;
}
#report.lang-te .prose{text-align:left;}
@media print{#report.lang-te, #report.lang-te *{
  font-family:'Noto Serif Telugu','Gautami','Nirmala UI',serif !important;letter-spacing:normal !important;}}

/* Indic print hardening: some print engines duplicate glyph clusters when
   ligature/kerning features are re-resolved. Lock them and disable synthesis. */
@media print{
  #report.lang-hi, #report.lang-hi *, #report.lang-te, #report.lang-te *{
    text-rendering:auto !important;
    font-variant-ligatures:normal !important;
    font-feature-settings:normal !important;
    font-synthesis:none !important;
    -webkit-font-smoothing:antialiased;
  }
}
</style>
</head>
<body>
<div class="screen" id="inputScreen">
  <h1 class="brand">💗 शुभ दिन — Your Love Story</h1>
  <div class="sub">How you love · Who you're meant to find · When love blooms · Written in your stars</div>
  <div class="row">
    <div><label>Name / नाम</label><input id="pname" value=""></div>
    <div><label>Gender / लिंग</label><select id="pgender"><option>Female</option><option>Male</option></select></div>
  </div>
  <div class="row">
    <div><label>Birth Date</label><input id="bdate" type="date" value="1996-12-06"></div>
    <div><label>Birth Time (24h)</label><input id="btime" type="time" value="15:47"></div>
  </div>
  <div class="row">
    <div><label>Latitude</label><input id="blat" type="number" step="0.0001" value="16.4343"></div>
    <div><label>Longitude</label><input id="blng" type="number" step="0.0001" value="81.6985"></div>
  </div>
  <label>Birth Place / जन्म स्थान</label><input id="bplace" value="Narasapur, AP">
  <div class="langToggle"><button id="lEn" class="on" onclick="setLang('en')">English</button><button id="lHi" onclick="setLang('hi')">हिन्दी</button><button id="lTe" onclick="setLang('te')">తెలుగు</button></div>
  <button onclick="confirmStep()">Reveal My Love Story → देखें</button>
  <div class="confirm" id="confirmBox">
    <div id="confirmText"></div>
    <div class="row">
      <button style="background:#5A8B2B;" onclick="generate()" id="btnReveal">✓ Correct — Reveal</button>
      <button style="background:#B8434A;" onclick="document.getElementById('confirmBox').style.display='none'">✗ Fix details</button>
    </div>
  </div>
</div>
<div class="printbar" id="printbar" style="display:none;"><button onclick="sdPrint()">🖨️ Print / Save as PDF</button></div>
<div id="report"></div>

<script src="astronomy.min.js"></script>
<script src="panchang-engine.js"></script>

 గులాబీ పూలు సమర్పించడం, అందాన్ని ఆదరించడం దీన్ని బలపరుస్తుంది."},venusNeutral:{en:"Your Venus holds a balanced placement, giving love a steady foundation.",hi:"आपका शुक्र संतुलित स्थिति में है, जो प्यार को मज़बूत नींव देता है।",te:"మీ జాతకంలో శుక్రుడు సమతుల్య స్థితిలో ఉన్నాడు, ఇది ప్రేమకు స్థిరమైన పునాది ఇస్తుంది."},venusRemedyIntro:{en:"Venus is the planet of love, beauty and sweetness. Honouring it brings tenderness to your relationships:",hi:"शुक्र प्यार, सुंदरता और मिठास का ग्रह है। इसे प्रसन्न रखना रिश्तों में मिठास लाता है:",te:"శుక్రుడు ప్రేమ, అందం, మాధుర్యానికి అధిపతి. ఆయనను ఆరాధించడం బంధాల్లో మాధుర్యాన్ని తెస్తుంది:"},closingQuote:{en:"\"The stars incline; they do not compel. Your open heart writes the truest love story of all.\"",hi:"\"सितारे राह दिखाते हैं, मजबूर नहीं करते। सबसे सच्ची प्रेम कहानी आपका खुला दिल ही लिखता है।\"",te:"\"గ్రహాలు దారి చూపిస్తాయి, బలవంతం చేయవు. అత్యంత నిజమైన ప్రేమ కథను రాసేది మీ తెరిచిన మనసే.\""}};

U.remedy={sun:{te:"ఆదివారం సూర్యుడికి నమస్కరించండి, ఉదయపు ఎండలో కొద్దిసేపు నిలబడండి. ఆత్మవిశ్వాసం, గౌరవం పెరుగుతాయి."},moon:{te:"సోమవారం శివుడిని ఆరాధించండి, తెల్లని వస్తువులు దానం చేయండి. మనసుకు ప్రశాంతత కలుగుతుంది."},mars:{te:"మంగళవారం హనుమంతుడిని ఆరాధించండి, ఓపికను అలవరచుకోండి. ధైర్యం సరైన దిశలో పని చేస్తుంది."},mercury:{te:"బుధవారం విష్ణువును స్మరించండి, పచ్చని వస్తువులు దానం చేయండి. మాటలో, వ్యవహారంలో స్పష్టత వస్తుంది."},jupiter:{te:"గురువారం గురువును ఆరాధించండి, పసుపు పచ్చని వస్తువులు దానం చేయండి, పెద్దలను గౌరవించండి. జ్ఞానం, అదృష్టం పెరుగుతాయి."},venus:{te:"శుక్రవారం లక్ష్మీదేవిని ఆరాధించండి, తెలుపు లేదా గులాబీ పూలు సమర్పించండి, అందాన్ని ఆదరించండి, ఉదారంగా ఇవ్వండి. ప్రేమలో, బంధాల్లో మాధుర్యం పెరుగుతుంది."},saturn:{te:"శనివారం శనిదేవుడిని ఆరాధించండి, నల్ల నువ్వులు దానం చేయండి, పేదలకు సాయం చేయండి. ఓపిక ఫలిస్తుంది."},rahu:{te:"దుర్గాదేవిని ఆరాధించండి, శనివారం దానం చేయండి, నిజాయితీగా ఉండండి. అనవసర గందరగోళం తగ్గుతుంది."},ketu:{te:"గణపతిని ఆరాధించండి, ధ్యానం అలవరచుకోండి, సాధువులకు సేవ చేయండి. మనసు స్థిరపడుతుంది."}};
U.marriage={boyDefault:{en:"Boy",hi:"वर",te:"వరుడు"},girlDefault:{en:"Girl",hi:"वधू",te:"వధువు"},outlookText:{en:"This is a favourable match according to classical compatibility principles. The emotional foundation is strong, and the identified challenges are manageable through communication, mutual respect, and the suggested remedies.",hi:"शास्त्रीय अनुकूलता सिद्धांतों के अनुसार यह एक शुभ संबंध है। भावनात्मक नींव सुदृढ़ है, और उल्लिखित चुनौतियाँ संवाद, परस्पर सम्मान तथा सुझाए गए उपायों से सहज प्रबंधनीय हैं।",te:"శాస్త్రీయ అనుకూలత సూత్రాల ప్రకారం ఇది ఒక శుభమైన బంధం. మనసుల పునాది బలంగా ఉంది, గుర్తించిన ఇబ్బందులు మాటలతో, పరస్పర గౌరవంతో, సూచించిన పరిహారాలతో సులభంగా సర్దుకుంటాయి."},confirmBoth:{en:"If both match known details, generate. (Do double-check AM/PM!)",hi:"दोनों विवरण सही हों तो रिपोर्ट बनाएँ। (AM/PM ज़रूर जाँचें!)",te:"రెండు వివరాలు సరిగ్గా ఉంటే రిపోర్ట్ తయారు చేయండి. (AM/PM తప్పకుండా చూడండి!)"},effectiveGuna:{en:"EFFECTIVE GUNA SCORE",hi:"असली गुण अंक",te:"అసలు గుణ స్కోర్"},noMajor:{en:"No major challenges ✓",hi:"कोई बड़ी चुनौती नहीं ✓",te:"పెద్ద ఇబ్బందులు లేవు ✓"},execSummary:{en:"Executive Summary",hi:"सारांश",te:"సారాంశం"},overallMatch:{en:"OVERALL MATCH",hi:"कुल मिलान",te:"మొత్తం మ్యాచ్"},bestQualities:{en:"BEST QUALITIES",hi:"सबसे अच्छी बातें",te:"అత్యుత్తమ లక్షణాలు"},challenges:{en:"CHALLENGES",hi:"ध्यान देने योग्य बातें",te:"గమనించాల్సినవి"},outlook:{en:"MARRIAGE OUTLOOK & RECOMMENDATION",hi:"विवाह का निष्कर्ष एवं सलाह",te:"వివాహ ఫలితం మరియు సలహా"},koota:{en:"Koota",hi:"कूट",te:"కూటం"},meaning:{en:"Meaning",hi:"अर्थ",te:"అర్థం"},points:{en:"Points",hi:"अंक",te:"పాయింట్లు"},dosha:{en:"Dosha",hi:"दोष",te:"దోషం"},nadiBhakoot:{en:"Nadi and Bhakoot — no dosha ✓",hi:"नाड़ी और भकूट — कोई दोष नहीं ✓",te:"నాడి, భకూట — దోషం లేదు ✓"},mangalDosha:{en:"Mangal Dosha",hi:"मंगल दोष",te:"కుజ దోషం"},cancelFactors:{en:"Cancellation factors",hi:"दोष कटने के कारण",te:"దోషం తొలగే కారణాలు"},noneSignificant:{en:"None significant ✓",hi:"कोई बड़ा कारण नहीं ✓",te:"గణనీయమైనవి లే U.manglik={none:{te:"రెండు జాతకాల్లోనూ కుజ దోషం లేదు — ఈ సంబంధానికి కుజుడి వల్ల ఎలాంటి అడ్డంకీ లేదు."},neutralized:{te:"రెండు జాతకాల్లోనూ కుజ దోషం ఉంది — శాస్త్ర నియమం ప్రకారం దోషం పరస్పరం తొలగిపోతుంది."},softened:{te:"ఒక జాతకంలో కుజ దోషం ఉంది, కానీ కింద చెప్పిన శాస్త్ర పరిహార కారణాల వల్ల అది తగ్గింది; సంప్రదాయ పరిహారాలతో ఈ సంబంధం ముందుకు సాగవచ్చు."},present:{te:"ఒక జాతకంలో కుజ దోషం ఉంది, తొలగించే కారణాలేవీ లేవు — ముందుకు వెళ్లేముందు కుజ శాంతి (హనుమాన్ ఉపాసన, మంగళవార వ్రతం) చేసి పెద్దల సలహా తీసుకోవాలని సంప్రదాయం చెబుతోంది."},note:{en:"Note: Mangal Dosha strength reflects Mars’ house position and aggravating or softening factors — which is why we show it as Mild / Moderate / Strong rather than a raw number.",hi:"नोट: मंगल दोष की तीव्रता मंगल की भाव-स्थिति से आँकी जाती है; एकाधिक कारक इसे बढ़ा या घटा सकते हैं।",te:"గమనిక: కుజ దోష తీవ్రత కుజుడి భావ స్థితిని బట్టి, దాన్ని పెంచే లేదా తగ్గించే అంశాలను బట్టి లెక్కిస్తారు — అందుకే దీన్ని ఒక సంఖ్యగా కాకుండా అల్ప / మధ్యమ / తీవ్ర అని చూపిస్తున్నాం."},"Mild":{en:"Mild",hi:"अल्प",te:"అల్ప"},"Moderate":{en:"Moderate",hi:"मध्यम",te:"మధ్యమ"},"Strong":{en:"Strong",hi:"प्रबल",te:"తీవ్ర"}};

 skill is your natural path. Leadership can be learned, but you shine most as a specialist.",hi:"आपकी शक्ति नेतृत्व से अधिक विशेषज्ञता में है — गहरी दक्षता से प्रभाव बनाना आपका स्वाभाविक मार्ग है। नेतृत्व सीखा जा सकता है, पर विशेषज्ञ के रूप में आप अधिक चमकते हैं।",te:"మీ బలం ఆజ్ఞాపించడంలో కాదు, నైపుణ్యంలో ఉంది — లోతైన నైపుణ్యంతో ప్రభావం చూపడమే మీ సహజ మార్గం. నాయకత్వం నేర్చుకోవచ్చు, కానీ నిపుణుడిగానే మీరు ఎక్కువ మెరుస్తారు."},whatToDo:{en:"What to do in each period — direct guidance on putting astrology to use:",hi:"हर अवधि में क्या करें — ज्योतिष को काम में लाने की सीधी सलाह:",te:"ప్రతి కాలంలో ఏమి చేయాలి — జ్యోతిష్యాన్ని ఆచరణలో పెట్టే స్పష్టమైన సూచనలు:"},avoidFields:{en:"These fields rest mainly on the same less-supported planet(s) in your chart, which is why they group together.",hi:"ये क्षेत्र मुख्यतः उन्हीं ग्रहों पर आधारित हैं जो आपकी कुंडली में कम बली हैं — इसलिए एक साथ समूहित हैं।",te:"ఈ రంగాలు మీ జాతకంలో తక్కువ బలం ఉన్న గ్రహాల మీదే ఆధారపడతాయి — అందుకే ఇవి ఒకే గుంపుగా ఉన్నాయి."}};

U.kundli={k001:{en:"CHAPTER",hi:"अध्याय",te:"అధ్యాయం"},k002:{en:"Your Spiritual Snapshot",hi:"आपका आध्यात्मिक दर्पण",te:"మీ ఆధ్యాత్మిక చిత్రం"},k003:{en:"The essence of your chart at a glance — every rating below is derived from your actual planetary dignities, house strengths (Ashtakavarga) and yogas. Nothing is invented.",hi:"आपकी कुंडली से गणना से निकाला गया सार — हर अंक ग्रह-गरिमा, भाव-बल और योगों से व्युत्पन्न है।",te:"మీ జాతకం సారాంశం ఒక్క చూపులో — కింద ఇచ్చిన ప్రతి రేటింగూ మీ అసలు గ్రహ స్థితులు, భావ బలాలు (అష్టకవర్గం), యోగాల ఆధారంగా వచ్చినది. ఏదీ ఊహించి రాసినది కాదు."},k004:{en:"YOUR STRONGEST QUALITIES",hi:"आपकी प्रबल शक्तियाँ",te:"మీ బలమైన లక్షణాలు"},k005:{en:"CURRENT LIFE PHASE",hi:"वर्तमान जीवन-चरण",te:"ప్రస్తుత జీవిత దశ"},k006:{en:"Mahadasha",hi:"महादशा",te:"మహాదశ"},k007:{en:"Antar",hi:"अंतर",te:"అంతర్దశ"},k008:{en:"OVERALL LIFE ENERGY",hi:"समग्र जीवन-ऊर्जा",te:"మొత్తం జీవన శక్తి"},k009:{en:"Formula: Ashtakavarga strength of your 1st, 9th and 10th houses + auspicious yogas + planetary dignities — every input verifiable in the chapters ahead.",hi:"सूत्र: लग्न-भाग्य-कर्म भावों का अष्टकवर्ग बल + शुभ योग",te:"సూత్రం: మీ 1వ, 9వ, 10వ భావాల అష్టకవర్గ బలం + శుభ యోగాలు + గ్రహ స్థితులు — ప్రతి అంశాన్నీ ముందున్న అధ్యాయాల్లో సరిచూసుకోవచ్చు."},k010:{en:"Career",hi:"करियर",te:"కెరీర్"},k011:{en:"Marriage & Love",hi:"विवाह व संबंध",te:"వివాహం, ప్రేమ"},k012:{en:"Wealth",hi:"धन",te:"సంపద"},k013:{en:"Health & Vitality",hi:"स्वास्थ्य",te:"ఆరోగ్యం, శక్తి"},k014:{en:"Learning & Children",hi:"विद्या-संतान",te:"విద్య, సంతానం"},k015:{en:"Spiritual Growth",hi:"आध्यात्म",te:"ఆధ్యాత్మిక ఎదుగుదల"},k016:{en:"Your Life Dashboard",hi:"जीवन डैशबोर्ड",te:"మీ జీవిత డాష్‌బోర్డ్"},k017:{en:"Each score = Ashtakavarga strength of the relevant houses + house-lord dignity + karaka planet condition. Every input is verifiable in the tables that follow — no score is invented.",hi:"प्रत्येक अंक = संबंधित भावों का अष्टकवर्ग बल + भावेश गरिमा + कारक ग्रह स्थिति — सभी आंकड़े आगे की सारणियों में सत्याप न संकेत",te:"ప్రాచీన విశేషం"},k040:{en:"The Sarvashtakavarga of every chart always totals exactly 337 bindus — verified in your own tables here; count them yourself!",hi:"अष्टकवर्ग का सर्वयोग सदा 337 बिंदु होता है — यह आपकी रिपोर्ट में भी सत्यापित है, गिनकर देख सकते हैं!",te:"ఏ జాతకంలోనైనా సర్వాష్టకవర్గం మొత్తం సరిగ్గా 337 బిందువులే — మీ పట్టికల్లోనే సరిచూసుకోవచ్చు; మీరే లెక్కించి చూడండి!"},k041:{en:"House",hi:"भाव",te:"భావం"},k042:{en:"Graha Phala — House Placements",hi:"ग्रह फल — भाव स्थिति",te:"గ్రహ ఫలం — భావ స్థితులు"},k043:{en:"Graha Phala (contd.)",hi:"ग्रह फल (क्रमशः)",te:"గ్రహ ఫలం (కొనసాగింపు)"},k044:{en:"Did You Know?",hi:"क्या आप जानते हैं?",te:"మీకు తెలుసా?"},k045:{en:"In the Parashara tradition, Venus rules the longest mahadasha (20 years) and the Sun the shortest (6 years) — the full cycle spans exactly 120 years.",hi:"पराशर परंपरा में शुक्र की महादशा सबसे लंबी (20 वर्ष) और सूर्य की सबसे छोटी (6 वर्ष) होती है — पूरा चक्र ठीक 120 वर्ष का है।",te:"పరాశర సంప్రదాయంలో శుక్రుడికి అత్యధిక మహాదశ (20 సంవత్సరాలు), సూర్యుడికి అత్యల్పం (6 సంవత్సరాలు) — మొత్తం చక్రం సరిగ్గా 120 సంవత్సరాలు."},k046:{en:"Marriage Matching, done properly",hi:"विवाह मिलान गहन विश्लेषण",te:"వివాహ మ్యాచింగ్ — సరైన పద్ధతిలో"},k047:{en:"Free tools stop at the Guna score. The paid Marriage Report adds classical dosha-CANCELLATION analysis, two-chart Manglik matching and marriage-timing windows — what no free tool checks.",hi:"निःशुल्क गुण-मिलान अंक देता है। सशुल्क विवाह रिपोर्ट दोष-परिहार नियम, दोनों कुंडलियों का मंगल-मिलान और विवाह-समय खिड़कियाँ जोड़ती है — जो कोई निःशुल्क टूल नहीं जाँचता।",te:"ఉచిత సాధనాలు గుణ స్కోరు దగ్గరే ఆగిపోతాయి. చెల్లింపు వివాహ రిపోర్ట్ శాస్త్రీయ దోష-పరిహార విశ్లేషణ, రెండు జాతకాల కుజ దోష పరిశీలన, వివాహ శుభ సమయాలు కూడా ఇస్తుంది — ఏ ఉచిత సాధనమూ చూడని అంశాలు."},k048:{en:"Classical significance",hi:"शास्त्रीय महत्त्व",te:"శాస్త్రీయ ప్రాముఖ్యత"},k049:{en:"Mangal Dosha",hi:"मंगल दोष",te:"కుజ దోషం"},k050:{en:"Kaal Sarpa",hi:"कालसर्प",te:"కాల సర్ప"},k051:{en:"Sade Sati",hi:"स
